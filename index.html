
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flipbook Ebook</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#111827;
    font-family:Arial,sans-serif;
    overflow:hidden;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.book-wrapper{
    flex:1;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
    padding:10px;
}

#flipbook{
    box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.page{
    background:white;
    overflow:hidden;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    user-select:none;
    pointer-events:none;
    display:block;
}

.controls{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:12px;
}

button{
    border:none;
    background:#1f2937;
    color:white;
    padding:10px 16px;
    border-radius:999px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    background:#374151;
}

button:active{
    transform:scale(.95);
}

#pageCounter{
    color:white;
    font-weight:bold;
    min-width:90px;
    text-align:center;
}

@media(max-width:768px){

    .controls{
        gap:6px;
    }

    button{
        padding:8px 12px;
        font-size:12px;
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="book-wrapper">
        <div id="flipbook"></div>
    </div>

    <div class="controls">

        <button id="prevBtn">◀ Prev</button>

        <div id="pageCounter">1 / 1</div>

        <button id="nextBtn">Next ▶</button>

        <button id="zoomIn">🔍 +</button>

        <button id="zoomOut">🔍 -</button>

        <button id="downloadPDF">📥 PDF</button>

    </div>

</div>

<audio id="flipSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2053/2053-preview.mp3" type="audio/mpeg">
</audio>

<script>

// ============================================
// CONFIG
// ============================================

const TOTAL_PAGES = 36;
const IMAGE_FOLDER = "images/";
const IMAGE_EXT = "jpg";

// ============================================

const flipbook = $("#flipbook");

let loadedPages = 0;
let zoom = 1;

// ============================================
// CREATE PAGES
// ============================================

for(let i=1;i<=TOTAL_PAGES;i++){

    const page = $("<div class='page'></div>");

    const img = $("<img>");

    img.attr("src",`${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`);

    img.attr("crossorigin","anonymous");

    img.on("load",()=>{

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){
            initBook();
        }
    });

    img.on("error",()=>{

        page.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:#999;
                font-size:20px;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){
            initBook();
        }
    });

    page.append(img);

    flipbook.append(page);
}

// ============================================
// RESPONSIVE SIZE
// ============================================

function getBookSize(){

    let width;
    let height;

    if(window.innerWidth < 768){

        width = window.innerWidth * 0.92;

    }else{

        width = Math.min(window.innerWidth * 0.45,900);
    }

    height = width * 1.414;

    const maxHeight = window.innerHeight * 0.82;

    if(height > maxHeight){

        height = maxHeight;

        width = height / 1.414;
    }

    return { width, height };
}

// ============================================
// INIT FLIPBOOK
// ============================================

function initBook(){

    const size = getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:50,

        duration:800,

        when:{

            turning:function(){

                const audio = document.getElementById("flipSound");

                audio.currentTime = 0;

                audio.play().catch(()=>{});
            },

            turned:function(e,page){

                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    enableSwipe();
}

// ============================================
// PAGE COUNTER
// ============================================

function updateCounter(page){

    document.getElementById("pageCounter").innerText = `${page} / ${TOTAL_PAGES}`;
}

// ============================================
// BUTTONS
// ============================================

$("#prevBtn").click(()=>{
    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{
    flipbook.turn("next");
});

// ============================================
// KEYBOARD
// ============================================

$(document).keydown(function(e){

    if(e.key === "ArrowLeft"){
        flipbook.turn("previous");
    }

    if(e.key === "ArrowRight"){
        flipbook.turn("next");
    }
});

// ============================================
// TOUCH SWIPE
// ============================================

function enableSwipe(){

    let startX = 0;

    document.addEventListener("touchstart",(e)=>{

        startX = e.changedTouches[0].screenX;

    },{passive:true});

    document.addEventListener("touchend",(e)=>{

        let endX = e.changedTouches[0].screenX;

        let diff = endX - startX;

        if(Math.abs(diff) > 50){

            if(diff < 0){
                flipbook.turn("next");
            }else{
                flipbook.turn("previous");
            }
        }

    },{passive:true});
}

// ============================================
// RESIZE
// ============================================

window.addEventListener("resize",()=>{

    if(!flipbook.turn("is")) return;

    const size = getBookSize();

    flipbook.turn("size",size.width,size.height);
});

// ============================================
// ZOOM
// ============================================

$("#zoomIn").click(()=>{

    zoom = Math.min(zoom + 0.1,2);

    applyZoom();
});

$("#zoomOut").click(()=>{

    zoom = Math.max(zoom - 0.1,0.6);

    applyZoom();
});

function applyZoom(){

    flipbook.css({
        transform:`scale(${zoom})`,
        transformOrigin:"center center"
    });
}

// ============================================
// PDF DOWNLOAD FIXED
// ============================================

// ============================================
// PERFECT PDF DOWNLOAD
// ============================================

$("#downloadPDF").click(async function () {

    const btn = this;

    const originalText = btn.innerText;

    btn.disabled = true;

    btn.innerText = "Preparing PDF...";

    try {

        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4",
            compress: true
        });

        const pdfWidth = pdf.internal.pageSize.getWidth();

        const pdfHeight = pdf.internal.pageSize.getHeight();

        // LOAD IMAGE FUNCTION
        async function loadImage(pageNumber) {

            return new Promise((resolve, reject) => {

                const webpPath =
                    `${IMAGE_FOLDER}page${pageNumber}.webp`;

                const jpgPath =
                    `${IMAGE_FOLDER}page${pageNumber}.jpg`;

                const img = new Image();

                img.crossOrigin = "anonymous";

                img.onload = () => resolve(img);

                img.onerror = () => {

                    // TRY JPG IF WEBP FAILS
                    const jpgImg = new Image();

                    jpgImg.crossOrigin = "anonymous";

                    jpgImg.onload = () => resolve(jpgImg);

                    jpgImg.onerror = () =>
                        reject(
                            new Error(
                                `Missing page ${pageNumber}`
                            )
                        );

                    jpgImg.src = jpgPath;
                };

                img.src = webpPath;
            });
        }

        // LOOP ALL PAGES
        for (let i = 1; i <= TOTAL_PAGES; i++) {

            btn.innerText =
                `Processing ${i}/${TOTAL_PAGES}`;

            const img = await loadImage(i);

            // CREATE CANVAS
            const canvas =
                document.createElement("canvas");

            const ctx =
                canvas.getContext("2d");

            canvas.width = img.naturalWidth;

            canvas.height = img.naturalHeight;

            // WHITE BACKGROUND
            ctx.fillStyle = "#ffffff";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            // HIGH QUALITY
            const imgData =
                canvas.toDataURL(
                    "image/jpeg",
                    0.9
                );

            // ADD PAGE
            if (i > 1) {
                pdf.addPage();
            }

            pdf.addImage(
                imgData,
                "JPEG",
                0,
                0,
                pdfWidth,
                pdfHeight
            );
        }

        btn.innerText = "Saving PDF...";

        pdf.save("ebook.pdf");

        btn.innerText = "Done ✓";

        setTimeout(() => {

            btn.innerText = originalText;

        }, 2000);

    } catch (err) {

        console.error(err);

        alert(err.message);

        btn.innerText = originalText;

    } finally {

        btn.disabled = false;
    }
});
</script>

</body>
</html>
