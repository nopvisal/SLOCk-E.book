<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1,
        maximum-scale=1,
        viewport-fit=cover
    "
/>

<title>SLOCK Catalog</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#020617;

    position:fixed;
}

body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top,
    #1e293b 0%,
    #0f172a 45%,
    #020617 100%);

    /* SAFARI / IPAD FIX */
    padding-top:max(env(safe-area-inset-top), 12px);

    padding-bottom:max(env(safe-area-inset-bottom), 12px);

    padding-left:max(env(safe-area-inset-left), 0px);

    padding-right:max(env(safe-area-inset-right), 0px);
}

/* =========================================
   APP
========================================= */

.app{

    width:100%;

    height:100%;

    display:flex;

    flex-direction:column;

    overflow:hidden;
}

/* =========================================
   TOPBAR
========================================= */

.topbar{

    width:100%;

    min-height:64px;

    flex-shrink:0;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:12px;

    padding:12px 18px;

    background:rgba(15,23,42,.88);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.08);

    z-index:99999;

    position:relative;
}

.left-tools,
.right-tools{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

/* =========================================
   BRAND
========================================= */

.brand{

    color:white;

    font-size:18px;

    font-weight:600;

    letter-spacing:.3px;
}

/* =========================================
   PAGE COUNTER
========================================= */

.page-indicator{

    color:#cbd5e1;

    font-size:14px;

    min-width:70px;

    text-align:center;
}

/* =========================================
   BUTTONS
========================================= */

.control-btn{

    border:none;

    outline:none;

    height:40px;

    min-width:40px;

    padding:0 14px;

    border-radius:12px;

    background:#1e293b;

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:13px;

    font-weight:500;

    cursor:pointer;

    transition:.2s ease;
}

.control-btn:hover{

    background:#334155;
}

.control-btn:active{

    transform:scale(.96);
}

/* =========================================
   BOOK AREA
========================================= */

.book-area{

    flex:1;

    width:100%;

    min-height:0;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:4px;
}

/* =========================================
   FLIPBOOK
========================================= */

#flipbook{

    transition:transform .25s ease;

    box-shadow:
    0 25px 70px rgba(0,0,0,.55);
}

.page{

    background:#111827;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* =========================================
   IMAGE DISPLAY
========================================= */

.page img{

    width:100%;

    height:100%;

    object-fit:contain;

    display:block;

    user-select:none;

    pointer-events:none;

    background:#111827;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

    .topbar{

        min-height:58px;

        padding:10px;
    }

    .brand{

        font-size:15px;
    }

    .control-btn{

        height:34px;

        min-width:34px;

        font-size:11px;

        padding:0 10px;
    }

    .page-indicator{

        font-size:12px;

        min-width:50px;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- =====================================
         TOPBAR
    ====================================== -->

    <div class="topbar">

        <div class="left-tools">

            <div class="brand">
                SLOCK Catalog
            </div>

        </div>

        <div class="right-tools">

            <button class="control-btn" id="prevBtn">
                ◀
            </button>

            <div class="page-indicator" id="pageCounter">
                1 / 1
            </div>

            <button class="control-btn" id="nextBtn">
                ▶
            </button>

            <button class="control-btn" id="zoomOut">
                −
            </button>

            <button class="control-btn" id="zoomIn">
                +
            </button>

            <button class="control-btn" id="downloadPDF">
                PDF
            </button>

        </div>

    </div>

    <!-- =====================================
         BOOK
    ====================================== -->

    <div class="book-area">

        <div id="flipbook"></div>

    </div>

</div>

<!-- =====================================
     SOUND
===================================== -->

<audio id="flipSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>

// ========================================
// CONFIG
// ========================================

const TOTAL_PAGES = 36;

const IMAGE_FOLDER = "images/";

const IMAGE_EXT = "jpg";

// ========================================

const flipbook = $("#flipbook");

let loadedPages = 0;

let zoom = 1;

// ========================================
// CREATE PAGES
// ========================================

for(let i = 1; i <= TOTAL_PAGES; i++){

    const page =
        $("<div class='page'></div>");

    const img =
        $("<img>");

    img.attr(
        "src",
        `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`
    );

    img.attr("crossorigin","anonymous");

    img.on("load",()=>{

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    img.on("error",()=>{

        page.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:22px;
                background:#111827;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    page.append(img);

    flipbook.append(page);
}

// ========================================
// RESPONSIVE SIZE
// ========================================

function getBookSize(){

    const topbar =
        document.querySelector(".topbar");

    const toolbarHeight =
        topbar.offsetHeight;

    const screenWidth =
        window.innerWidth;

    const screenHeight =
        window.innerHeight - toolbarHeight;

    // A4 ratio
    const ratio = 0.707;

    let width =
        screenWidth;

    let height =
        width / ratio;

    if(height > screenHeight){

        height = screenHeight;

        width = height * ratio;
    }

    width *= 0.995;

    height *= 0.995;

    return{

        width:Math.floor(width),

        height:Math.floor(height)
    };
}

// ========================================
// INIT BOOK
// ========================================

function initBook(){

    const size =
        getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:40,

        duration:700,

        when:{

            turning:function(){

                playFlipSound();
            },

            turned:function(e,page){

                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    enableSwipe();
}

// ========================================
// COUNTER
// ========================================

function updateCounter(page){

    document.getElementById(
        "pageCounter"
    ).innerText =
    `${page} / ${TOTAL_PAGES}`;
}

// ========================================
// SOUND
// ========================================

function playFlipSound(){

    const sound =
        document.getElementById("flipSound");

    sound.pause();

    sound.currentTime = 0;

    sound.volume = 1;

    sound.play().catch(()=>{});
}

// ========================================
// BUTTONS
// ========================================

$("#prevBtn").click(()=>{

    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{

    flipbook.turn("next");
});

$("#zoomIn").click(()=>{

    zoom = Math.min(zoom + 0.1, 2);

    applyZoom();
});

$("#zoomOut").click(()=>{

    zoom = Math.max(zoom - 0.1, 0.6);

    applyZoom();
});

// ========================================
// PDF DOWNLOAD
// ========================================

$("#downloadPDF").click(async function(){

    const btn = this;

    const originalText =
        btn.innerHTML;

    btn.disabled = true;

    btn.innerHTML = "Preparing...";

    try{

        const { jsPDF } =
            window.jspdf;

        const pdf = new jsPDF({

            orientation:"portrait",

            unit:"mm",

            format:"a4",

            compress:true
        });

        const pdfWidth =
            pdf.internal.pageSize.getWidth();

        const pdfHeight =
            pdf.internal.pageSize.getHeight();

        async function loadImage(pageNumber){

            return new Promise((resolve,reject)=>{

                const img = new Image();

                img.crossOrigin = "anonymous";

                img.onload =
                    ()=> resolve(img);

                img.onerror =
                    ()=> reject(
                        new Error(
                            `Missing Page ${pageNumber}`
                        )
                    );

                img.src =
                `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
            });
        }

        for(let i = 1; i <= TOTAL_PAGES; i++){

            btn.innerHTML =
            `${i}/${TOTAL_PAGES}`;

            const img =
                await loadImage(i);

            const canvas =
                document.createElement("canvas");

            const ctx =
                canvas.getContext("2d");

            canvas.width =
                img.naturalWidth;

            canvas.height =
                img.naturalHeight;

            ctx.fillStyle = "#ffffff";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const imgData =
                canvas.toDataURL(
                    "image/jpeg",
                    0.95
                );

            if(i > 1){

                pdf.addPage();
            }

            pdf.addImage(
                imgData,
                "JPEG",
                0,
                0,
                pdfWidth,
                pdfHeight
            );
        }

        btn.innerHTML = "Saving...";

        pdf.save("ebook.pdf");

        btn.innerHTML = "Done ✓";

        setTimeout(()=>{

            btn.innerHTML =
                originalText;

        },1500);

    }catch(err){

        console.error(err);

        alert(err.message);

        btn.innerHTML =
            originalText;

    }finally{

        btn.disabled = false;
    }
});

// ========================================
// APPLY ZOOM
// ========================================

function applyZoom(){

    flipbook.css({

        transform:`scale(${zoom})`,

        transformOrigin:"center center"
    });
}

// ========================================
// KEYBOARD
// ========================================

$(document).keydown(function(e){

    if(e.key === "ArrowLeft"){

        flipbook.turn("previous");
    }

    if(e.key === "ArrowRight"){

        flipbook.turn("next");
    }
});

// ========================================
// SWIPE
// ========================================

function enableSwipe(){

    let startX = 0;

    document.addEventListener(

        "touchstart",

        (e)=>{

            startX =
            e.changedTouches[0].screenX;
        },

        { passive:true }
    );

    document.addEventListener(

        "touchend",

        (e)=>{

            let endX =
            e.changedTouches[0].screenX;

            let diff =
            endX - startX;

            if(Math.abs(diff) > 50){

                if(diff < 0){

                    flipbook.turn("next");

                }else{

                    flipbook.turn("previous");
                }
            }
        },

        { passive:true }
    );
}

// ========================================
// RESIZE FIX
// ========================================

window.addEventListener("resize",()=>{

    if(!flipbook.turn("is")) return;

    setTimeout(()=>{

        const size =
            getBookSize();

        flipbook.turn(
            "size",
            size.width,
            size.height
        );

    },100);
});

</script>

</body>
</html>
