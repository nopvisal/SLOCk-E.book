<script>
  (function() {
    // ========== FASTEST POSSIBLE LOADING ==========
    // Strategy: Show book IMMEDIATELY with placeholder backgrounds
    // Load images in background with progressive display

    const TOTAL_PAGES = 36;
    const IMAGE_FOLDER = "images/";
    const IMAGE_EXT = "webp";
    
    let bookReady = false;
    let imagesLoaded = new Array(TOTAL_PAGES + 1).fill(false);
    let flipbookInitialized = false;

    // Audio setup
    const flipSound = document.getElementById("flipSound");
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      flipSound.play().then(() => {
        flipSound.pause();
        flipSound.currentTime = 0;
        audioUnlocked = true;
      }).catch(() => {});
      audioUnlocked = true;
    }
    document.body.addEventListener("touchstart", unlockAudio, { once: true });
    document.body.addEventListener("click", unlockAudio, { once: true });
    
    function playFlipSound() {
      if (!audioUnlocked) return;
      flipSound.currentTime = 0;
      flipSound.volume = 0.4;
      flipSound.play().catch(() => {});
    }
    
    // Create all pages IMMEDIATELY with solid background (no waiting)

      const $page = $("<div class='page'></div>");
      // Placeholder background color
      $page.css({ background: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center" });
      const $img = $("<img>");
      $img.attr("alt", `Page ${i}`);
      $img.css({ opacity: 0, transition: "opacity 0.25s ease" });
      $page.append($img);
      $flipbook.append($page);
      
      // Store reference
      $page.data("pageNum", i);
      $page.data("img", $img);
    }
    
    // Load images asynchronously with priority (page 1 first)
    function loadImage(pageNum) {
      return new Promise((resolve) => {
        if (imagesLoaded[pageNum]) { resolve(true); return; }
        const $page = $flipbook.find(".page").eq(pageNum - 1);
        const $img = $page.data("img");
        if (!$img || $img.length === 0) { resolve(false); return; }
        
        const imgSrc = `${IMAGE_FOLDER}page${pageNum}.${IMAGE_EXT}`;
        const imgElement = new Image();
        imgElement.crossOrigin = "anonymous";
        imgElement.onload = () => {
          $img.attr("src", imgSrc);
          $img.css("opacity", 1);
          imagesLoaded[pageNum] = true;
          resolve(true);
        };
        imgElement.onerror = () => {
          // Show error placeholder
          $page.html(`<div style="color:#64748b; font-size:14px;">⚠️ Page ${pageNum}</div>`);
          imagesLoaded[pageNum] = true;
          resolve(false);
        };
        imgElement.src = imgSrc;
      });
    }
    
    // Priority loading: page 1 first, then 2,3,4, then rest in background
    async function loadAllPagesProgressive() {
      // CRITICAL: Load page 1 FIRST and wait for it to show
      await loadImage(1);
      
      // Hide loader immediately after page 1 is visible
      if (loader) {
        loader.style.opacity = "0";
        setTimeout(() => { if (loader) loader.style.display = "none"; }, 300);
      }
      
      // Load next few pages with higher priority
      const priorityPages = [2, 3, 4, 5, 6];
      for (let p of priorityPages) {
        if (p <= TOTAL_PAGES) loadImage(p);
        await new Promise(r => setTimeout(r, 30));
      }
      
      // Load remaining pages in background (batch)
      for (let i = 7; i <= TOTAL_PAGES; i++) {
        loadImage(i);
        // Small delay to not block UI
        if (i % 4 === 0) await new Promise(r => setTimeout(r, 10));
      }
    }
    
    // Initialize flipbook as soon as possible (no waiting for images)
    function initFlipbook() {
      if (flipbookInitialized) return;
      
      const areaRect = bookArea.getBoundingClientRect();
      let maxWidth = areaRect.width * 0.92;
      let maxHeight = areaRect.height * 0.92;
      const ratio = 0.707; // ~A5 proportion
      let width = maxWidth;
      let height = width / ratio;
      if (height > maxHeight) {
        height = maxHeight;
        width = height * ratio;
      }
      width = Math.floor(width);
      height = Math.floor(height);
      
      $flipbook.turn({
        width: width,
        height: height,
        autoCenter: true,
        display: "single",
        acceleration: true,
        gradients: true,
        elevation: 50,
        duration: 500,
        when: {
          turning: function(e, page, pageObj) {
            playFlipSound();
            // Preload adjacent pages on flip

            if (page - 1 >= 1 && !imagesLoaded[page - 1]) loadImage(page - 1);
            if (page + 1 <= TOTAL_PAGES && !imagesLoaded[page + 1]) loadImage(page + 1);
          },
          turned: function(e, page) {

            }

      bookReady = true;

            let newMaxWidth = newAreaRect.width * 0.92;
            let newMaxHeight = newAreaRect.height * 0.92;
            let newWidth = newMaxWidth;
            let newHeight = newWidth / ratio;
            if (newHeight > newMaxHeight) {

    function updateCounter(page) {

    // ========== ZOOM & PAN (smooth, gesture-based) ==========
    let currentZoom = 1;

    let pinchStartDistance = 0;
    let isPinching = false;
    let isPanning = false;
    let lastTouchX = 0, lastTouchY = 0;
    let lastPanX = 0, lastPanY = 0;
    let lastTapTime = 0, lastTapX = 0, lastTapY = 0;
    let tapTimeout = null;
    let swipeStartX = 0, swipeActive = false;
    
    function applyTransform() {
      zoomContainer.style.transform = `translate3d(${currentPanX}px, ${currentPanY}px, 0) scale(${currentZoom})`;
      if (currentZoom > 1.02) {

      } else {
        $flipbook.css("pointer-events", "auto");
        if (currentPanX !== 0 || currentPanY !== 0) {
          currentPanX = 0;
          currentPanY = 0;
          zoomContainer.style.transform = `translate3d(0px, 0px, 0) scale(1)`;
        }
      }
    }
    
    function resetZoomAndPan() {
      currentZoom = 1;
      currentPanX = 0;
      currentPanY = 0;
      applyTransform();
    }
    
    function getDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);

          if (tapTimeout) clearTimeout(tapTimeout);
          lastTapTime = 0;

          lastTapY = ty;

          const maxPanY = Math.max(0, (scaledH - containerRect.height) / 2);

    document.getElementById("zoomOutBtn").addEventListener("click", () => {

      currentZoom = Math.max(1.0, currentZoom - 0.2);
      if (currentZoom <= 1.02) { currentPanX = 0; currentPanY = 0; }

    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("previous");
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("next");
    });
    
    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (!bookReady) return;
      if (e.key === "ArrowLeft") $flipbook.turn("previous");
      if (e.key === "ArrowRight") $flipbook.turn("next");
    });
    
    // ========== PDF EXPORT WITH VISUAL PROGRESS ==========
    function showPDFToast(current, total) {
      let toast = document.getElementById("pdfToast");
      if (!toast) {
        const div = document.createElement("div");
        div.id = "pdfToast";
        div.className = "pdf-toast";

          <span>📄 Generating PDF</span>
          <div class="bar"><div class="fill" id="pdfFill"></div></div>
          <span id="pdfPercent">0%</span>

        document.body.appendChild(div);

      const percent = Math.floor((current / total) * 100);
      const fill = document.getElementById("pdfFill");
      const percentSpan = document.getElementById("pdfPercent");
      if (fill) fill.style.width = percent + "%";
      if (percentSpan) percentSpan.innerText = percent + "%";
      toast.style.display = "flex";
      if (current === total) {
        setTimeout(() => {
          if (toast) toast.style.display = "none";
        }, 1500);
      }
    }
    
    document.getElementById("downloadPDF").addEventListener("click", async function() {

      btn.innerHTML = "📄 PDF...";

          btn.innerHTML = `📄 ${i}/${TOTAL_PAGES}`;

          if (!imagesLoaded[i]) {

            await loadImage(i);
            // Small extra wait if still not loaded
            if (!imagesLoaded[i]) {

            }
          }

              setTimeout(resolve, 800);

            if (tempImg.complete && tempImg.naturalWidth > 0) imgElement = tempImg;
          }

            const ctx = canvas.getContext("2d");
            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            ctx.fillStyle = "#ffffff";

            if (i > 1) pdf.addPage();
            pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);

        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }, 1500);

        btn.disabled = false;
