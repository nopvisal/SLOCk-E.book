<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      font-family: 'Inter', sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      width: 100%;
      min-height: 64px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 99999;
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .page-indicator {
      color: #cbd5e1;
      font-size: 14px;
      min-width: 70px;
      text-align: center;
      font-weight: 500;
    }

    .control-btn {
      border: none;
      height: 40px;
      min-width: 40px;
      padding: 0 14px;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .control-btn:active { transform: scale(0.96); }

    /* Book area – manages pinch zoom & pan */
    .book-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #020617;
      touch-action: none; /* we handle all touch gestures */
    }

    /* Zoom container – applies scale & pan */
    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-origin: center center;
      will-change: transform;
    }

    /* Flipbook container – turn.js will size it dynamically */
    #flipbook {
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      transition: box-shadow 0.2s;
    }

    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
      background: #111827;
    }

    @media (max-width: 768px) {
      .topbar { min-height: 58px; padding: 10px; }
      .brand { font-size: 15px; }
      .control-btn { height: 34px; font-size: 11px; padding: 0 10px; }
      .page-indicator { font-size: 12px; min-width: 50px; }
    }

    .zoom-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      color: #e2e8f0;
      pointer-events: none;
      z-index: 10;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left-tools">
      <div class="brand">SLOCK Catalog</div>
    </div>
    <div class="right-tools">
      <button class="control-btn" id="prevBtn">◀</button>
      <div class="page-indicator" id="pageCounter">1 / 36</div>
      <button class="control-btn" id="nextBtn">▶</button>
      <button class="control-btn" id="zoomOut">−</button>
      <button class="control-btn" id="zoomIn">+</button>
      <button class="control-btn" id="downloadPDF"> PDF</button>
    </div>
  </div>
  <div class="book-area" id="bookArea">
    <div class="zoom-container" id="zoomContainer">
      <div id="flipbook"></div>
    </div>
    <div class="zoom-hint"> Pinch to zoom · Drag to pan · Swipe to flip</div>
  </div>
</div>

<audio id="flipSound" preload="auto" crossorigin="anonymous">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // ========================= CONFIGURATION =========================
    const TOTAL_PAGES = 36;
    const IMAGE_FOLDER = "images/";
    const IMAGE_EXT = "jpg";

    // DOM elements
    const $flipbook = $("#flipbook");
    const bookArea = document.getElementById("bookArea");
    const zoomContainer = document.getElementById("zoomContainer");
    let loadedPages = 0;
    let bookReady = false;
    let currentPage = 1;

    // Audio unlock flag (needed for some browsers on GitHub Pages)
    let audioUnlocked = false;
    const flipSound = document.getElementById("flipSound");
    function unlockAudio() {
      if (audioUnlocked) return;
      if (flipSound) {
        flipSound.play().then(() => {
          flipSound.pause();
          flipSound.currentTime = 0;
          audioUnlocked = true;
        }).catch(() => {});
      }
      audioUnlocked = true;
    }
    // Unlock on first user touch anywhere
    document.body.addEventListener("touchstart", unlockAudio, { once: true });
    document.body.addEventListener("click", unlockAudio, { once: true });

    function playFlipSound() {
      if (!flipSound) return;
      // Only play if unlocked (or try anyway)
      flipSound.pause();
      flipSound.currentTime = 0;
      flipSound.volume = 0.7;
      flipSound.play().catch(e => console.log("Sound blocked until user interaction"));
    }

    // ========================= BUILD PAGES =========================
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const $page = $("<div class='page'></div>");
      const $img = $("<img>");
      $img.attr("src", `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`);
      $img.attr("crossorigin", "anonymous");
      $img.on("load", () => {
        loadedPages++;
        if (loadedPages === TOTAL_PAGES) initFlipbook();
      });
      $img.on("error", () => {
        $page.html(`<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white; background:#111827; font-size:20px;">⚠️ Missing ${i}</div>`);
        loadedPages++;
        if (loadedPages === TOTAL_PAGES) initFlipbook();
      });
      $page.append($img);
      $flipbook.append($page);
    }

    // ========================= FLIPBOOK INIT (3D) =========================
    function getBookSize() {
      const areaRect = bookArea.getBoundingClientRect();
      let maxWidth = areaRect.width * 0.92;
      let maxHeight = areaRect.height * 0.92;
      const ratio = 0.707; // A4 portrait
      let width = maxWidth;
      let height = width / ratio;
      if (height > maxHeight) {
        height = maxHeight;
        width = height * ratio;
      }
      return { width: Math.floor(width), height: Math.floor(height) };
    }

    function initFlipbook() {
      if (bookReady) return;
      const { width, height } = getBookSize();
      $flipbook.turn({
        width: width,
        height: height,
        autoCenter: true,
        display: "single",
        acceleration: true,
        gradients: true,
        elevation: 50,
        duration: 600,
        when: {
          turning: function(e, page, pageObject) {
            playFlipSound(); // sound on every turn
          },
          turned: function(e, page) {
            currentPage = page;
            updateCounter(page);
          }
        }
      });
      updateCounter(1);
      bookReady = true;
      // set initial zoom container transform
      resetZoomAndPan();
      // resize listener
      window.addEventListener("resize", () => {
        if ($flipbook.turn("is")) {
          setTimeout(() => {
            const newSize = getBookSize();
            $flipbook.turn("size", newSize.width, newSize.height);
            resetZoomAndPan();
          }, 100);
        }
      });
    }

    function updateCounter(page) {
      document.getElementById("pageCounter").innerText = `${page} / ${TOTAL_PAGES}`;
    }

    // ========================= PINCH ZOOM & PAN (hand zoom) =========================
    let currentZoom = 1;
    let currentPanX = 0, currentPanY = 0;
    let initialZoom = 1, initialPanX = 0, initialPanY = 0;
    let pinchStartDistance = 0;
    let isPinching = false;
    let isPanning = false;
    let lastTouchX = 0, lastTouchY = 0;
    let lastPanX = 0, lastPanY = 0;

    function applyTransform() {
      if (!zoomContainer) return;
      zoomContainer.style.transform = `translate3d(${currentPanX}px, ${currentPanY}px, 0) scale(${currentZoom})`;
    }

    function resetZoomAndPan() {
      currentZoom = 1;
      currentPanX = 0;
      currentPanY = 0;
      applyTransform();
    }

    function getDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    // ========================= SWIPE TO FLIP (only when zoom is near 1) =========================
    let touchStartX = 0, touchStartY = 0;
    let touchMoved = false;
    const SWIPE_THRESHOLD = 50;

    // unified touch handler on bookArea
    bookArea.addEventListener("touchstart", (e) => {
      const touches = e.touches;
      if (touches.length === 2) {
        // pinch start
        isPinching = true;
        pinchStartDistance = getDistance(touches);
        initialZoom = currentZoom;
        initialPanX = currentPanX;
        initialPanY = currentPanY;
        e.preventDefault();
      } else if (touches.length === 1 && currentZoom <= 1.05) {
        // swipe detection (only when not zoomed)
        touchStartX = touches[0].clientX;
        touchStartY = touches[0].clientY;
        touchMoved = false;
      } else if (touches.length === 1 && currentZoom > 1.05) {
        // pan mode
        isPanning = true;
        lastTouchX = touches[0].clientX;
        lastTouchY = touches[0].clientY;
        lastPanX = currentPanX;
        lastPanY = currentPanY;
        e.preventDefault();
      }
    }, { passive: false });

    bookArea.addEventListener("touchmove", (e) => {
      const touches = e.touches;
      if (isPinching && touches.length === 2) {
        const newDist = getDistance(touches);
        if (pinchStartDistance > 0) {
          let scale = newDist / pinchStartDistance;
          let newZoom = initialZoom * scale;
          newZoom = Math.min(3.5, Math.max(0.7, newZoom));
          if (newZoom !== currentZoom) {
            currentZoom = newZoom;
            // adjust pan to keep center stable
            const rect = bookArea.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            // recompute pan to keep book centered under fingers? simpler: just set
            currentPanX = initialPanX;
            currentPanY = initialPanY;
            applyTransform();
          }
        }
        e.preventDefault();
      } else if (isPanning && touches.length === 1 && currentZoom > 1.05) {
        const dx = touches[0].clientX - lastTouchX;
        const dy = touches[0].clientY - lastTouchY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
          currentPanX = lastPanX + dx;
          currentPanY = lastPanY + dy;
          // boundary clamp (prevent overscroll)
          const containerRect = bookArea.getBoundingClientRect();
          const flipRect = $flipbook.get(0).getBoundingClientRect();
          const scaledW = flipRect.width * currentZoom;
          const scaledH = flipRect.height * currentZoom;
          const maxPanX = Math.max(0, (scaledW - containerRect.width) / 2);
          const maxPanY = Math.max(0, (scaledH - containerRect.height) / 2);
          currentPanX = Math.min(maxPanX, Math.max(-maxPanX, currentPanX));
          currentPanY = Math.min(maxPanY, Math.max(-maxPanY, currentPanY));
          applyTransform();
        }
        e.preventDefault();
      } else if (!isPinching && !isPanning && touches.length === 1 && currentZoom <= 1.05 && touchStartX !== 0) {
        const deltaX = touches[0].clientX - touchStartX;
        const deltaY = touches[0].clientY - touchStartY;
        if (Math.abs(deltaX) > 15 || Math.abs(deltaY) > 15) {
          touchMoved = true;
        }
        // optional: prevent vertical scroll while swiping
        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 20) {
          e.preventDefault();
        }
      }
    }, { passive: false });

    bookArea.addEventListener("touchend", (e) => {
      if (!isPinching && !isPanning && touchStartX !== 0 && touchMoved && currentZoom <= 1.05) {
        const changed = e.changedTouches[0];
        if (changed) {
          const deltaX = changed.clientX - touchStartX;
          if (Math.abs(deltaX) > SWIPE_THRESHOLD) {
            if (deltaX > 0) {
              $flipbook.turn("previous");
            } else {
              $flipbook.turn("next");
            }
          }
        }
      }
      isPinching = false;
      isPanning = false;
      touchStartX = 0;
      touchStartY = 0;
      touchMoved = false;
      pinchStartDistance = 0;
    });

    // ========================= BUTTON CONTROLS =========================
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("previous");
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("next");
    });
    document.getElementById("zoomIn").addEventListener("click", () => {
      if (!bookReady) return;
      currentZoom = Math.min(3.5, currentZoom + 0.15);
      applyTransform();
    });
    document.getElementById("zoomOut").addEventListener("click", () => {
      if (!bookReady) return;
      currentZoom = Math.max(0.7, currentZoom - 0.15);
      if (currentZoom <= 1.05) {
        currentPanX = 0;
        currentPanY = 0;
      }
      applyTransform();
    });

    // ========================= PDF EXPORT =========================
    document.getElementById("downloadPDF").addEventListener("click", async function() {
      const btn = this;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = "📄 Preparing...";
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        async function loadImage(pg) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error(`Missing page ${pg}`));
            img.src = `${IMAGE_FOLDER}page${pg}.${IMAGE_EXT}`;
          });
        }

        for (let i = 1; i <= TOTAL_PAGES; i++) {
          btn.innerHTML = `📄 ${i}/${TOTAL_PAGES}`;
          const img = await loadImage(i);
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const imgData = canvas.toDataURL("image/jpeg", 0.95);
          if (i > 1) pdf.addPage();
          pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
        }
        btn.innerHTML = "💾 Saving...";
        pdf.save("slock_catalog.pdf");
        btn.innerHTML = "✅ Done!";
        setTimeout(() => { btn.innerHTML = originalText; }, 1500);
      } catch (err) {
        alert("PDF error: " + err.message);
        btn.innerHTML = originalText;
      } finally {
        btn.disabled = false;
      }
    });

    // Keyboard arrows
    document.addEventListener("keydown", (e) => {
      if (!bookReady) return;
      if (e.key === "ArrowLeft") $flipbook.turn("previous");
      if (e.key === "ArrowRight") $flipbook.turn("next");
    });

    // Fallback init after timeout
    setTimeout(() => {
      if (!bookReady && loadedPages < TOTAL_PAGES) {
        initFlipbook();
      }
    }, 5000);
  })();
</script>
</body>
</html>
