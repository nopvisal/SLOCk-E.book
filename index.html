<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SLOCK CATALOG</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f172a;
    --panel:rgba(15,23,42,.75);
    --border:rgba(255,255,255,.08);
    --button:#1e293b;
    --button-hover:#334155;
    --text:#ffffff;
    --muted:#cbd5e1;
    --shadow:0 20px 50px rgba(0,0,0,.45);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at top,#1e293b 0%,#0f172a 45%,#020617 100%);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* =========================
   TOP TOOLBAR
========================= */

.topbar{
    width:100%;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;

    background:var(--panel);
    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);

    z-index:100;
}

.left-tools,
.right-tools{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.brand{
    color:white;
    font-size:18px;
    font-weight:600;
    letter-spacing:.3px;
}

.page-indicator{
    color:var(--muted);
    font-size:14px;
    min-width:80px;
    text-align:center;
}

/* =========================
   BUTTONS
========================= */

.control-btn{
    border:none;
    outline:none;

    height:42px;
    min-width:42px;

    padding:0 16px;

    border-radius:14px;

    background:var(--button);

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    font-size:14px;
    font-weight:500;

    cursor:pointer;

    transition:.25s ease;
}

.control-btn:hover{
    background:var(--button-hover);
    transform:translateY(-1px);
}

.control-btn:active{
    transform:scale(.96);
}

.control-btn svg{
    width:18px;
    height:18px;
}

/* =========================
   BOOK AREA
========================= */

.book-area{
    flex:1;
    width:100%;
    overflow:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:25px;
}

#flipbook{
    box-shadow:var(--shadow);
    transition:transform .25s ease;
}

.page{
    background:white;
    overflow:hidden;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    user-select:none;
    pointer-events:none;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .topbar{
        padding:10px;
        flex-direction:column;
        align-items:stretch;
    }

    .left-tools,
    .right-tools{
        justify-content:center;
    }

    .brand{
        text-align:center;
    }

    .control-btn{
        height:40px;
        font-size:13px;
        padding:0 12px;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- ======================
         TOP BAR
    ======================= -->

    <div class="topbar">

        <div class="left-tools">

            <div class="brand">
                SLOCK Catalog
            </div>

        </div>

        <div class="right-tools">

            <button class="control-btn" id="prevBtn">
                ◀ Prev
            </button>

            <div class="page-indicator" id="pageCounter">
                1 / 1
            </div>

            <button class="control-btn" id="nextBtn">
                Next ▶
            </button>

            <button class="control-btn" id="zoomOut">
                −
            </button>

            <button class="control-btn" id="zoomIn">
                +
            </button>

            <button class="control-btn" id="downloadPDF">
                PDF
            </button>

        </div>

    </div>

    <!-- ======================
         BOOK
    ======================= -->

    <div class="book-area">

        <div id="flipbook"></div>

    </div>

</div>

<!-- ======================
     REALISTIC PAGE SOUND
====================== -->

<!-- REALISTIC PAGE FLIP SOUND -->
<audio id="flipSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>

// ============================================
// CONFIG
// ============================================

const TOTAL_PAGES = 36;
const IMAGE_FOLDER = "images/";
const IMAGE_EXT = "jpg";

// ============================================

const flipbook = $("#flipbook");

let loadedPages = 0;
let zoom = 1;

// ============================================
// CREATE PAGES
// ============================================

for(let i = 1; i <= TOTAL_PAGES; i++){

    const page = $("<div class='page'></div>");

    const img = $("<img>");

    img.attr(
        "src",
        `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`
    );

    img.attr("crossorigin","anonymous");

    img.on("load",()=>{

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    img.on("error",()=>{

        page.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:22px;
                color:#999;
                background:#fff;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    page.append(img);

    flipbook.append(page);
}

// ============================================
// RESPONSIVE SIZE
// ============================================

function getBookSize(){

    let width;
    let height;

    if(window.innerWidth < 768){

        width = window.innerWidth * 0.92;

    }else{

        width = Math.min(
            window.innerWidth * 0.42,
            950
        );
    }

    height = width * 1.414;

    const maxHeight = window.innerHeight * 0.78;

    if(height > maxHeight){

        height = maxHeight;

        width = height / 1.414;
    }

    return { width, height };
}

// ============================================
// INIT BOOK
// ============================================

function initBook(){

    const size = getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:60,

        duration:900,

        when:{

            turning:function(){

                playFlipSound();
            },

            turned:function(e,page){

                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    enableSwipe();
}

// ============================================
// PAGE COUNTER
// ============================================

function updateCounter(page){

    document.getElementById(
        "pageCounter"
    ).innerText =
    `${page} / ${TOTAL_PAGES}`;
}

// ============================================
// FLIP SOUND
// ============================================

function playFlipSound(){

    const sound = document.getElementById("flipSound");

    sound.volume = 1;

    sound.pause();

    sound.currentTime = 0;

    sound.play().then(()=>{

    }).catch((e)=>{

        console.log("Sound blocked until user interaction");

    });
}

// ============================================
// BUTTONS
// ============================================

$("#prevBtn").click(()=>{

    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{

    flipbook.turn("next");
});

$("#zoomIn").click(()=>{

    zoom = Math.min(zoom + 0.1, 2);

    applyZoom();
});

$("#zoomOut").click(()=>{

    zoom = Math.max(zoom - 0.1, 0.6);

    applyZoom();
});

// ============================================
// APPLY ZOOM
// ============================================

function applyZoom(){

    flipbook.css({

        transform:`scale(${zoom})`,
        transformOrigin:"center center"
    });
}

// ============================================
// KEYBOARD SUPPORT
// ============================================

$(document).keydown(function(e){

    if(e.key === "ArrowLeft"){

        flipbook.turn("previous");
    }

    if(e.key === "ArrowRight"){

        flipbook.turn("next");
    }
});

// ============================================
// MOBILE SWIPE
// ============================================

function enableSwipe(){

    let startX = 0;

    document.addEventListener(

        "touchstart",

        (e)=>{

            startX =
                e.changedTouches[0].screenX;
        },

        { passive:true }
    );

    document.addEventListener(

        "touchend",

        (e)=>{

            let endX =
                e.changedTouches[0].screenX;

            let diff = endX - startX;

            if(Math.abs(diff) > 50){

                if(diff < 0){

                    flipbook.turn("next");

                }else{

                    flipbook.turn("previous");
                }
            }
        },

        { passive:true }
    );
}

// ============================================
// RESIZE
// ============================================

window.addEventListener("resize",()=>{

    if(!flipbook.turn("is")) return;

    const size = getBookSize();

    flipbook.turn(
        "size",
        size.width,
        size.height
    );
});

// ============================================
// PROFESSIONAL PDF DOWNLOAD
// ============================================

$("#downloadPDF").click(async function(){

    const btn = this;

    const originalText = btn.innerHTML;

    btn.disabled = true;

    btn.innerHTML = "Preparing...";

    try{

        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({

            orientation:"portrait",
            unit:"mm",
            format:"a4",
            compress:true
        });

        const pdfWidth =
            pdf.internal.pageSize.getWidth();

        const pdfHeight =
            pdf.internal.pageSize.getHeight();

        async function loadImage(pageNumber){

            return new Promise((resolve,reject)=>{

                const img = new Image();

                img.crossOrigin = "anonymous";

                img.onload = ()=> resolve(img);

                img.onerror = ()=> reject(
                    new Error(
                        `Missing Page ${pageNumber}`
                    )
                );

                img.src =
                    `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
            });
        }

        for(let i = 1; i <= TOTAL_PAGES; i++){

            btn.innerHTML =
                `${i}/${TOTAL_PAGES}`;

            const img =
                await loadImage(i);

            const canvas =
                document.createElement("canvas");

            const ctx =
                canvas.getContext("2d");

            canvas.width =
                img.naturalWidth;

            canvas.height =
                img.naturalHeight;

            ctx.fillStyle = "#ffffff";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const imgData =
                canvas.toDataURL(
                    "image/jpeg",
                    0.95
                );

            if(i > 1){

                pdf.addPage();
            }

            pdf.addImage(
                imgData,
                "JPEG",
                0,
                0,
                pdfWidth,
                pdfHeight
            );
        }

        btn.innerHTML = "Saving...";

        pdf.save("ebook.pdf");

        btn.innerHTML = "Done ✓";

        setTimeout(()=>{

            btn.innerHTML = originalText;

        },1500);

    }catch(err){

        console.error(err);

        alert(err.message);

        btn.innerHTML = originalText;

    }finally{

        btn.disabled = false;
    }
});

</script>

</body>
</html>
