<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>SLOCK Catalog</title>

    <!-- Preload only the first 6 critical pages – the rest stream in later -->
    <link rel="preload" as="image" href="images/page1.webp" />
    <link rel="preload" as="image" href="images/page2.webp" />
    <link rel="preload" as="image" href="images/page3.webp" />
    <link rel="preload" as="image" href="images/page4.webp" />
    <link rel="preload" as="image" href="images/page5.webp" />
    <link rel="preload" as="image" href="images/page6.webp" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
            font-family: 'Inter', sans-serif;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            width: 100%;
            min-height: 70px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 99999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .left-tools,
        .right-tools {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .page-indicator {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
            letter-spacing: 0.3px;
            min-width: 85px;
            text-align: center;
            transition: all 0.25s ease;
        }

        .control-btn {
            border: none;
            outline: none;
            height: 42px;
            min-width: 42px;
            padding: 0 18px;
            border-radius: 30px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(4px);
            color: #f1f5f9;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.2px;
        }

        .control-btn:hover {
            background: #334155;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
        }
        .control-btn:active {
            transform: scale(0.96);
            background: #1e293b;
        }

        @media (max-width: 680px) {
            .topbar {
                padding: 10px 16px;
                gap: 10px;
                min-height: 60px;
            }
            .left-tools,
            .right-tools {
                gap: 8px;
            }
            .brand {
                font-size: 1rem;
            }
            .control-btn {
                height: 36px;
                min-width: 36px;
                padding: 0 12px;
                font-size: 0.75rem;
            }
            .page-indicator {
                padding: 4px 10px;
                font-size: 0.75rem;
                min-width: 70px;
            }
        }

        .book-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #020617;
            touch-action: none;
        }

        .zoom-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
            transform-origin: center center;
            transition: transform 0.08s ease-out;
        }
        .zoom-container.animating {
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        #flipbook {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            cursor: grab;
        }
        #flipbook:active {
            cursor: grabbing;
        }
        #flipbook.turn-dragging {
            cursor: grabbing;
        }

        /* Cursor hints for draggable page edges */
        #flipbook .page {
            background: #111827;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #flipbook .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            background: #111827;
            transition: opacity 0.18s ease;
        }

        #flipbook .page img.lazy-load {
            opacity: 0;
        }
        #flipbook .page img.loaded {
            opacity: 1;
        }
        #flipbook .page .loading-placeholder {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(110deg, #1e293b 8%, #2d3a4f 18%, #1e293b 33%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite linear;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .zoom-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #cbd5e6;
            pointer-events: none;
            z-index: 20;
            letter-spacing: 0.3px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .zoom-hint.visible {
            opacity: 1;
        }

        .torx-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f172a, #020617);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            transition: opacity 0.35s ease;
        }
        .torx {
            width: 80px;
            height: 80px;
            position: relative;
            animation: spin 1.2s linear infinite;
        }
        .torx svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.5));
        }
        .torx .path {
            stroke: #38bdf8;
            stroke-width: 3;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 240;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes dash {
            0% {
                stroke-dashoffset: 240;
            }
            50% {
                stroke-dashoffset: 80;
            }
            100% {
                stroke-dashoffset: 240;
            }
        }
        .loader-text {
            margin-top: 24px;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .loader-progress {
            margin-top: 12px;
            width: 200px;
            height: 3px;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .loader-progress-bar {
            width: 0%;
            height: 100%;
            background: #38bdf8;
            transition: width 0.1s linear;
            border-radius: 10px;
        }
        @media (max-width: 768px) {
            .torx {
                width: 60px;
                height: 60px;
            }
            .loader-text {
                font-size: 0.75rem;
            }
            .loader-progress {
                width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="left-tools">
                <div class="brand">SLOCK</div>
            </div>
            <div class="right-tools">
                <button class="control-btn" id="prevBtn" aria-label="Previous page">◀</button>
                <div class="page-indicator" id="pageCounter">1 / 36</div>
                <button class="control-btn" id="nextBtn" aria-label="Next page">▶</button>
                <button class="control-btn" id="zoomOutBtn" aria-label="Zoom out">−</button>
                <button class="control-btn" id="zoomInBtn" aria-label="Zoom in">+</button>
                <button class="control-btn" id="downloadPDF" aria-label="Download PDF">PDF</button>
            </div>
        </div>
        <div class="book-area" id="bookArea">
            <div class="zoom-container" id="zoomContainer">
                <div id="flipbook"></div>
            </div>
            <div class="zoom-hint" id="zoomHint">🖐️ Pinch or scroll to zoom · Double‑tap to reset</div>
        </div>
    </div>

    <div id="torxLoader" class="torx-loader">
        <div class="torx">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="path" d="M50 10 L62 25 L50 40 L38 25 Z M50 60 L62 75 L50 90 L38 75 Z M10 35 L25 47 L10 59 L25 71 M90 35 L75 47 L90 59 L75 71" stroke="#38bdf8" stroke-width="2.5" fill="none" />
                <circle cx="50" cy="50" r="8" stroke="#38bdf8" stroke-width="2" fill="none" />
            </svg>
        </div>
        <div class="loader-text">LOADING SLOCK CATALOG</div>
        <div class="loader-progress"><div class="loader-progress-bar" id="loadProgressBar"></div></div>
        <div class="loader-text" id="progressPercent" style="font-size:0.75rem; margin-top:6px;">0%</div>
    </div>

    <script>
        (function() {
            const TOTAL_PAGES = 36;
            const IMAGE_FOLDER = "images/";
            const IMAGE_EXT = "webp";

            // Display mode threshold: >= 900px → double-page spread (desktop / iPad landscape)
            const DOUBLE_DISPLAY_THRESHOLD = 900;

            // Show flipbook as soon as page 1 is loaded
            const MIN_PAGES_FOR_TURN = 1;
            const PRELOAD_RADIUS = 18;
            const MAX_CONCURRENT_PRELOADS = 12;

            let pagesLoadedStatus = new Array(TOTAL_PAGES + 1).fill(false);
            let pageElements = [];
            let bookReady = false;
            let activePreloads = 0;
            let preloadQueue = [];
            let currentDisplayMode = 'single'; // 'single' | 'double'
            let lastFlipSoundTime = 0;

            const $flipbook = $("#flipbook");
            const bookArea = document.getElementById("bookArea");
            const zoomContainer = document.getElementById("zoomContainer");
            const torxLoader = document.getElementById("torxLoader");
            const progressBar = document.getElementById("loadProgressBar");
            const progressPercentSpan = document.getElementById("progressPercent");
            const zoomHint = document.getElementById("zoomHint");

            // ========== REALISTIC BOOK SLIDING SOUND (Web Audio synthesis) ==========
            let audioCtx = null;

            function playFlipSound() {
                if (!bookReady) return;
                // Debounce: only play once every 280ms to avoid overlapping during rapid drags
                const now = Date.now();
                if (now - lastFlipSoundTime < 280) return;
                lastFlipSoundTime = now;

                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }

                    const ctxNow = audioCtx.currentTime;

                    // 1. Low thump – the body of the book landing / shifting
                    const thumpDur = 0.09;
                    const thumpBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * thumpDur, audioCtx.sampleRate);
                    const thumpData = thumpBuffer.getChannelData(0);
                    for (let i = 0; i < thumpData.length; i++) {
                        thumpData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.012));
                    }
                    const thumpSource = audioCtx.createBufferSource();
                    thumpSource.buffer = thumpBuffer;
                    const thumpLowpass = audioCtx.createBiquadFilter();
                    thumpLowpass.type = "lowpass";
                    thumpLowpass.frequency.value = 300;
                    const thumpGain = audioCtx.createGain();
                    thumpGain.gain.setValueAtTime(0.45, ctxNow);
                    thumpGain.gain.exponentialRampToValueAtTime(0.001, ctxNow + thumpDur);
                    thumpSource.connect(thumpLowpass);
                    thumpLowpass.connect(thumpGain);
                    thumpGain.connect(audioCtx.destination);
                    thumpSource.start(ctxNow);
                    thumpSource.stop(ctxNow + thumpDur);

                    // 2. Main sliding swoosh – mid‑range paper rustle
                    const slideDur = 0.38;
                    const slideBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * slideDur, audioCtx.sampleRate);
                    const slideData = slideBuffer.getChannelData(0);
                    for (let i = 0; i < slideData.length; i++) {
                        slideData[i] = (Math.random() * 2 - 1);
                    }
                    const slideSource = audioCtx.createBufferSource();
                    slideSource.buffer = slideBuffer;
                    const bpFilter = audioCtx.createBiquadFilter();
                    bpFilter.type = "bandpass";
                    bpFilter.frequency.value = 1100;
                    bpFilter.Q.value = 0.9;
                    const slideGain = audioCtx.createGain();
                    slideGain.gain.setValueAtTime(0.0, ctxNow);
                    slideGain.gain.linearRampToValueAtTime(0.32, ctxNow + 0.02);
                    slideGain.gain.linearRampToValueAtTime(0.24, ctxNow + slideDur - 0.06);
                    slideGain.gain.exponentialRampToValueAtTime(0.001, ctxNow + slideDur);
                    slideSource.connect(bpFilter);
                    bpFilter.connect(slideGain);
                    slideGain.connect(audioCtx.destination);
                    slideSource.start(ctxNow);
                    slideSource.stop(ctxNow + slideDur);

                    // 3. Subtle high‑frequency swipe – loose pages brushing
                    const swipeDur = 0.22;
                    const swipeBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * swipeDur, audioCtx.sampleRate);
                    const swipeData = swipeBuffer.getChannelData(0);
                    for (let i = 0; i < swipeData.length; i++) {
                        swipeData[i] = (Math.random() * 2 - 1);
                    }
                    const swipeSource = audioCtx.createBufferSource();
                    swipeSource.buffer = swipeBuffer;
                    const hpFilter = audioCtx.createBiquadFilter();
                    hpFilter.type = "highpass";
                    hpFilter.frequency.value = 3200;
                    const swipeGain = audioCtx.createGain();
                    swipeGain.gain.setValueAtTime(0.0, ctxNow + 0.03);
                    swipeGain.gain.linearRampToValueAtTime(0.07, ctxNow + 0.06);
                    swipeGain.gain.exponentialRampToValueAtTime(0.001, ctxNow + swipeDur);
                    swipeSource.connect(hpFilter);
                    hpFilter.connect(swipeGain);
                    swipeGain.connect(audioCtx.destination);
                    swipeSource.start(ctxNow + 0.04);
                    swipeSource.stop(ctxNow + 0.04 + swipeDur);

                } catch (e) {
                    // Fail silently
                }
            }

            // Unlock AudioContext on first user interaction
            function unlockAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }
            document.body.addEventListener("touchstart", unlockAudio, { once: true });
            document.body.addEventListener("mousedown", unlockAudio, { once: true });

            // --- Display mode detection ---
            function getDisplayMode() {
                return window.innerWidth >= DOUBLE_DISPLAY_THRESHOLD ? 'double' : 'single';
            }

            // --- Progress ---
            function updateLoadProgress() {
                const loadedCount = pagesLoadedStatus.filter(v => v === true).length;
                const percent = Math.floor((loadedCount / TOTAL_PAGES) * 100);
                if (progressBar) progressBar.style.width = percent + "%";
                if (progressPercentSpan) progressPercentSpan.innerText = percent + "%";

                if (!bookReady && loadedCount >= MIN_PAGES_FOR_TURN) {
                    initFlipbookEarly();
                }
            }

            // --- Fast image loader ---
            function loadImageForPage(pageNum, imgElement, placeholderDiv) {
                return new Promise((resolve) => {
                    if (pagesLoadedStatus[pageNum]) {
                        resolve(true);
                        return;
                    }

                    const imgSrc = `${IMAGE_FOLDER}page${pageNum}.${IMAGE_EXT}`;
                    const img = new Image();
                    img.decoding = "async";
                    img.onload = () => {
                        imgElement.src = imgSrc;
                        imgElement.classList.add("loaded");
                        if (placeholderDiv) {
                            placeholderDiv.style.opacity = "0";
                            setTimeout(() => { if (placeholderDiv.parentNode) placeholderDiv.remove(); }, 80);
                        }
                        pagesLoadedStatus[pageNum] = true;
                        updateLoadProgress();
                        resolve(true);
                    };
                    img.onerror = () => {
                        imgElement.alt = `Page ${pageNum} missing`;
                        const parent = imgElement.parentNode;
                        if (parent && !parent.querySelector(".error-fallback")) {
                            const errDiv = document.createElement("div");
                            errDiv.className = "error-fallback";
                            errDiv.innerText = `⚠️ Page ${pageNum}`;
                            errDiv.style.cssText =
                                "color:#94a3b8;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111827;";
                            parent.appendChild(errDiv);
                        }
                        pagesLoadedStatus[pageNum] = true;
                        updateLoadProgress();
                        resolve(false);
                    };
                    img.src = imgSrc;
                });
            }

            // --- Build page DOM ---
            function createPageElement(pageNum) {
                const $page = $("<div class='page'></div>");
                const placeholderDiv = document.createElement("div");
                placeholderDiv.className = "loading-placeholder";
                const $img = $("<img class='lazy-load'>");
                $img.attr("alt", `page ${pageNum}`);
                $page.append(placeholderDiv);
                $page.append($img);

                const imgEl = $img[0];
                const placeEl = placeholderDiv;
                pageElements[pageNum] = { $page, imgEl, placeEl, loaded: false };
                return $page;
            }

            function buildAllPageElements() {
                // Clear existing references
                pageElements = new Array(TOTAL_PAGES + 1).fill(null);
                $flipbook.empty();
                for (let i = 1; i <= TOTAL_PAGES; i++) {
                    $flipbook.append(createPageElement(i));
                }
            }

            // --- Background preloader ---
            let currentPreloadCenter = 1;
            let preloadScheduled = false;

            function scheduleSmartPreload(centerPage) {
                currentPreloadCenter = Math.min(TOTAL_PAGES, Math.max(1, centerPage));
                if (preloadScheduled) return;
                preloadScheduled = true;
                setTimeout(() => {
                    preloadScheduled = false;
                    const start = Math.max(1, currentPreloadCenter - PRELOAD_RADIUS);
                    const end = Math.min(TOTAL_PAGES, currentPreloadCenter + PRELOAD_RADIUS);
                    const toLoad = [];
                    for (let p = start; p <= end; p++) {
                        if (!pagesLoadedStatus[p]) toLoad.push(p);
                    }
                    toLoad.sort((a, b) => Math.abs(a - currentPreloadCenter) - Math.abs(b - currentPreloadCenter));
                    for (let p of toLoad) {
                        if (!pagesLoadedStatus[p] && activePreloads < MAX_CONCURRENT_PRELOADS) {
                            const elem = pageElements[p];
                            if (elem && !elem.loaded) {
                                activePreloads++;
                                loadImageForPage(p, elem.imgEl, elem.placeEl).finally(() => {
                                    activePreloads--;
                                    if (elem) elem.loaded = true;
                                    processPreloadQueue();
                                });
                            }
                        } else if (!pagesLoadedStatus[p] && activePreloads >= MAX_CONCURRENT_PRELOADS) {
                            if (!preloadQueue.includes(p)) preloadQueue.push(p);
                        }
                    }
                }, 20);
            }

            function processPreloadQueue() {
                while (preloadQueue.length > 0 && activePreloads < MAX_CONCURRENT_PRELOADS) {
                    const next = preloadQueue.shift();
                    const nextElem = pageElements[next];
                    if (nextElem && !pagesLoadedStatus[next]) {
                        activePreloads++;
                        loadImageForPage(next, nextElem.imgEl, nextElem.placeEl).finally(() => {
                            activePreloads--;
                            if (nextElem) nextElem.loaded = true;
                            processPreloadQueue();
                        });
                    }
                }
            }

            function startInitialLoading() {
                const criticalPages = [1, 2, 3, 4, 5, 6];
                for (const p of criticalPages) {
                    const elem = pageElements[p];
                    if (elem && !pagesLoadedStatus[p]) {
                        loadImageForPage(p, elem.imgEl, elem.placeEl).finally(() => { if (elem) elem.loaded =
                                true; });
                    }
                }
                for (let i = 7; i <= TOTAL_PAGES; i++) {
                    const elem = pageElements[i];
                    if (elem && !pagesLoadedStatus[i]) {
                        loadImageForPage(i, elem.imgEl, elem.placeEl).finally(() => { if (elem) elem.loaded =
                                true; });
                    }
                }
                scheduleSmartPreload(1);
            }

            // --- Book sizing ---
            function getOptimalBookSize(displayMode) {
                const areaRect = bookArea.getBoundingClientRect();
                const maxWidth = areaRect.width * 0.92;
                const maxHeight = areaRect.height * 0.92;

                if (displayMode === 'double') {
                    // Two portrait pages side by side → landscape aspect ~1.414
                    const ratio = 1.414;
                    let width = maxWidth;
                    let height = width / ratio;
                    if (height > maxHeight) {
                        height = maxHeight;
                        width = height * ratio;
                    }
                    return { width: Math.floor(width), height: Math.floor(height) };
                } else {
                    // Single portrait page → aspect ~0.707
                    const ratio = 0.707;
                    let width = maxWidth;
                    let height = width / ratio;
                    if (height > maxHeight) {
                        height = maxHeight;
                        width = height * ratio;
                    }
                    return { width: Math.floor(width), height: Math.floor(height) };
                }
            }

            // --- Page counter ---
            function updateCounter(page) {
                const displayMode = currentDisplayMode;
                const counterEl = document.getElementById("pageCounter");

                if (displayMode === 'double') {
                    if (page <= 1) {
                        counterEl.innerText = `1 / ${TOTAL_PAGES}`;
                    } else if (page >= TOTAL_PAGES) {
                        counterEl.innerText = `${TOTAL_PAGES} / ${TOTAL_PAGES}`;
                    } else {
                        const rightPage = Math.min(page + 1, TOTAL_PAGES);
                        counterEl.innerText = `${page}–${rightPage} / ${TOTAL_PAGES}`;
                    }
                } else {
                    counterEl.innerText = `${page} / ${TOTAL_PAGES}`;
                }

                if (bookReady) scheduleSmartPreload(page);
            }

            // --- Flipbook initialization ---
            function initFlipbook(displayMode, targetPage) {
                if (bookReady) {
                    try { $flipbook.turn("destroy"); } catch (e) {}
                    bookReady = false;
                }

                // Rebuild page DOM if needed
                if (pageElements.filter(Boolean).length < TOTAL_PAGES) {
                    buildAllPageElements();
                } else {
                    // Ensure all page elements are appended
                    $flipbook.empty();
                    for (let i = 1; i <= TOTAL_PAGES; i++) {
                        if (pageElements[i] && pageElements[i].$page) {
                            $flipbook.append(pageElements[i].$page);
                        } else {
                            $flipbook.append(createPageElement(i));
                        }
                    }
                }

                currentDisplayMode = displayMode;
                const { width, height } = getOptimalBookSize(displayMode);

                $flipbook.turn({
                    width: width,
                    height: height,
                    autoCenter: true,
                    display: displayMode,
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 420,
                    page: targetPage || 1,
                    turnCorners: "tl,tr,bl,br",
                    when: {
                        turning: function(e, page) {
                            playFlipSound();
                            if (page >= 1 && page <= TOTAL_PAGES) scheduleSmartPreload(page);
                        },
                        turned: function(e, page) {
                            updateCounter(page);
                            scheduleSmartPreload(page);
                        },
                        missing: function(e, pages) {
                            // Handle any missing pages gracefully
                            for (let i = 0; i < pages.length; i++) {
                                const p = pages[i];
                                if (p >= 1 && p <= TOTAL_PAGES && !pagesLoadedStatus[p]) {
                                    const elem = pageElements[p];
                                    if (elem && !elem.loaded) {
                                        loadImageForPage(p, elem.imgEl, elem.placeEl).finally(() => {
                                            if (elem) elem.loaded = true;
                                        });
                                    }
                                }
                            }
                        }
                    }
                });

                bookReady = true;
                const currentPage = $flipbook.turn("page") || targetPage || 1;
                updateCounter(currentPage);
                resetZoomAndPan();
                scheduleSmartPreload(currentPage);

                // Hide loader
                if (torxLoader && torxLoader.style.display !== "none") {
                    torxLoader.style.opacity = "0";
                    setTimeout(() => { if (torxLoader) torxLoader.style.display = "none"; }, 350);
                }

                // Kick off loading for any unloaded pages
                for (let i = 1; i <= TOTAL_PAGES; i++) {
                    if (!pagesLoadedStatus[i]) {
                        const elem = pageElements[i];
                        if (elem && !elem.loaded) {
                            loadImageForPage(i, elem.imgEl, elem.placeEl).finally(() => { if (elem) elem.loaded =
                                    true; });
                        }
                    }
                }
            }

            function initFlipbookEarly() {
                if (bookReady) return;
                const displayMode = getDisplayMode();
                initFlipbook(displayMode, 1);
            }

            // --- Zoom & Pan state ---
            let currentZoom = 1,
                currentPanX = 0,
                currentPanY = 0;
            let initialZoom = 1,
                initialPanX = 0,
                initialPanY = 0;
            let pinchStartDistance = 0;
            let isPinching = false,
                isPanning = false;
            let lastTouchX = 0,
                lastTouchY = 0,
                lastPanX = 0,
                lastPanY = 0;
            let lastTapTime = 0,
                lastTapX = 0,
                lastTapY = 0,
                tapTimeout = null;
            let swipeStartX = 0,
                swipeStartY = 0,
                swipeActive = false,
                swipeHandledByTurn = false;

            let mouseIsDown = false,
                mouseStartX = 0,
                mouseStartY = 0,
                mouseMoved = false,
                mousePanX = 0,
                mousePanY = 0;

            function applyTransform(animate = false) {
                if (animate) {
                    zoomContainer.classList.add("animating");
                    setTimeout(() => zoomContainer.classList.remove("animating"), 260);
                } else {
                    zoomContainer.classList.remove("animating");
                }
                zoomContainer.style.transform = `translate3d(${currentPanX}px, ${currentPanY}px, 0) scale(${currentZoom})`;

                if (currentZoom > 1.02) {
                    $flipbook.css("pointer-events", "none");
                    zoomHint.classList.add("visible");
                } else {
                    $flipbook.css("pointer-events", "auto");
                    zoomHint.classList.remove("visible");
                    if (currentPanX !== 0 || currentPanY !== 0) {
                        currentPanX = 0;
                        currentPanY = 0;
                        zoomContainer.style.transform = `translate3d(0px, 0px, 0) scale(1)`;
                    }
                }
            }

            function resetZoomAndPan() {
                currentZoom = 1;
                currentPanX = 0;
                currentPanY = 0;
                applyTransform(true);
            }

            function getDistance(touches) {
                if (touches.length < 2) return 0;
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                return Math.hypot(dx, dy);
            }

            function clampPan() {
                const containerRect = bookArea.getBoundingClientRect();
                const flipRect = document.getElementById("flipbook").getBoundingClientRect();
                const scaledW = flipRect.width * currentZoom;
                const scaledH = flipRect.height * currentZoom;
                const maxPanX = Math.max(0, (scaledW - containerRect.width) / 2);
                const maxPanY = Math.max(0, (scaledH - containerRect.height) / 2);
                currentPanX = Math.min(maxPanX, Math.max(-maxPanX, currentPanX));
                currentPanY = Math.min(maxPanY, Math.max(-maxPanY, currentPanY));
            }

            // ------- TOUCH EVENTS -------
            bookArea.addEventListener("touchstart", function(e) {
                const touches = e.touches;

                // Double-tap detection for zoom reset (works regardless of zoom level)
                if (touches.length === 1 && !isPinching && !isPanning) {
                    const now = Date.now();
                    const tx = touches[0].clientX;
                    const ty = touches[0].clientY;
                    if (now - lastTapTime < 300 && Math.hypot(tx - lastTapX, ty - lastTapY) < 40) {
                        resetZoomAndPan();
                        e.preventDefault();
                        if (tapTimeout) clearTimeout(tapTimeout);
                        lastTapTime = 0;
                        return;
                    } else {
                        lastTapTime = now;
                        lastTapX = tx;
                        lastTapY = ty;
                        if (tapTimeout) clearTimeout(tapTimeout);
                        tapTimeout = setTimeout(() => { lastTapTime = 0; }, 300);
                    }
                }

                // Two-finger pinch → zoom (always intercept)
                if (touches.length === 2) {
                    isPinching = true;
                    isPanning = false;
                    swipeActive = false;
                    pinchStartDistance = getDistance(touches);
                    initialZoom = currentZoom;
                    initialPanX = currentPanX;
                    initialPanY = currentPanY;
                    e.preventDefault();
                    return;
                }

                // One finger when zoomed in → pan
                if (touches.length === 1 && currentZoom > 1.02) {
                    isPanning = true;
                    isPinching = false;
                    swipeActive = false;
                    lastTouchX = touches[0].clientX;
                    lastTouchY = touches[0].clientY;
                    lastPanX = currentPanX;
                    lastPanY = currentPanY;
                    e.preventDefault();
                    return;
                }

                // One finger when zoomed out → let turn.js handle it (do NOT prevent default)
                if (touches.length === 1 && currentZoom <= 1.02) {
                    isPanning = false;
                    isPinching = false;
                    swipeActive = true;
                    swipeHandledByTurn = false;
                    swipeStartX = touches[0].clientX;
                    swipeStartY = touches[0].clientY;
                    // DO NOT prevent default – let turn.js receive the event for native drag-to-turn
                    return;
                }
            }, { passive: false });

            bookArea.addEventListener("touchmove", function(e) {
                const touches = e.touches;

                // Pinch zoom
                if (isPinching && touches.length === 2) {
                    const newDist = getDistance(touches);
                    if (pinchStartDistance > 0) {
                        let newZoom = initialZoom * (newDist / pinchStartDistance);
                        newZoom = Math.min(4.0, Math.max(1.0, newZoom));
                        if (newZoom !== currentZoom) {
                            currentZoom = newZoom;
                            currentPanX = initialPanX;
                            currentPanY = initialPanY;
                            applyTransform();
                        }
                    }
                    e.preventDefault();
                    return;
                }

                // Pan when zoomed in
                if (isPanning && touches.length === 1 && currentZoom > 1.02) {
                    const dx = touches[0].clientX - lastTouchX;
                    const dy = touches[0].clientY - lastTouchY;
                    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                        currentPanX = lastPanX + dx;
                        currentPanY = lastPanY + dy;
                        clampPan();
                        applyTransform();
                    }
                    e.preventDefault();
                    return;
                }

                // Swipe tracking when zoomed out – let turn.js handle it
                if (swipeActive && touches.length === 1 && currentZoom <= 1.02) {
                    const dx = touches[0].clientX - swipeStartX;
                    const dy = touches[0].clientY - swipeStartY;
                    // If significant horizontal movement, it might be a swipe turn.js missed
                    if (Math.abs(dx) > 25 && Math.abs(dx) > Math.abs(dy) * 1.2) {
                        swipeHandledByTurn = true;
                        // Still don't prevent default – turn.js may still be handling it
                    }
                    return;
                }
            }, { passive: false });

            bookArea.addEventListener("touchend", function(e) {
                // Fallback swipe handling for when turn.js doesn't catch the swipe
                if (swipeActive && currentZoom <= 1.02 && !isPinching && !isPanning && bookReady) {
                    const changed = e.changedTouches[0];
                    if (changed && swipeStartX !== 0) {
                        const deltaX = changed.clientX - swipeStartX;
                        const deltaY = changed.clientY - swipeStartY;
                        // Only trigger if it's a clear horizontal swipe and turn.js didn't handle it
                        if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 1.3 && !swipeHandledByTurn) {
                            if (deltaX > 0) {
                                $flipbook.turn("previous");
                            } else {
                                $flipbook.turn("next");
                            }
                        }
                    }
                }
                isPinching = false;
                isPanning = false;
                swipeActive = false;
                swipeHandledByTurn = false;
                pinchStartDistance = 0;
            });

            // ------- MOUSE EVENTS -------
            bookArea.addEventListener("wheel", function(e) {
                if (!bookReady) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.08 : 0.08;
                let newZoom = currentZoom + delta;
                newZoom = Math.min(4.0, Math.max(1.0, newZoom));
                if (newZoom !== currentZoom) {
                    const rect = bookArea.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const scale = newZoom / currentZoom;
                    currentPanX = mouseX - (mouseX - currentPanX - centerX) * scale - centerX;
                    currentPanY = mouseY - (mouseY - currentPanY - centerY) * scale - centerY;
                    currentZoom = newZoom;
                    clampPan();
                    applyTransform();
                }
            }, { passive: false });

            bookArea.addEventListener("mousedown", function(e) {
                if (!bookReady) return;
                if (e.button === 2) return; // Right-click

                // Only intercept for pan when zoomed in
                if (currentZoom > 1.02) {
                    mouseIsDown = true;
                    mouseStartX = e.clientX;
                    mouseStartY = e.clientY;
                    mouseMoved = false;
                    mousePanX = currentPanX;
                    mousePanY = currentPanY;
                    e.preventDefault();
                    return;
                }

                // When zoomed out, let turn.js handle the mousedown for drag-to-turn
                // Don't set mouseIsDown, don't prevent default
                mouseIsDown = false;
            });

            window.addEventListener("mousemove", function(e) {
                if (!mouseIsDown || !bookReady) return;
                const dx = e.clientX - mouseStartX;
                const dy = e.clientY - mouseStartY;
                if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                    mouseMoved = true;
                }
                if (mouseMoved && currentZoom > 1.02) {
                    currentPanX = mousePanX + dx;
                    currentPanY = mousePanY + dy;
                    clampPan();
                    applyTransform();
                }
            });

            window.addEventListener("mouseup", function(e) {
                if (!mouseIsDown || !bookReady) return;
                mouseIsDown = false;
                // When zoomed out, turn.js handles clicks. When zoomed in and no drag occurred,
                // we do nothing special (user can click to zoom out via double-click)
                mouseMoved = false;
            });

            bookArea.addEventListener("contextmenu", function(e) { e.preventDefault(); });
            bookArea.addEventListener("dblclick", function() { if (bookReady) resetZoomAndPan(); });

            // --- Button handlers ---
            document.getElementById("zoomInBtn").addEventListener("click", function() {
                if (!bookReady) return;
                currentZoom = Math.min(4.0, currentZoom + 0.2);
                if (currentZoom <= 1.02) { currentPanX = 0;
                    currentPanY = 0; }
                applyTransform();
            });
            document.getElementById("zoomOutBtn").addEventListener("click", function() {
                if (!bookReady) return;
                currentZoom = Math.max(1.0, currentZoom - 0.2);
                if (currentZoom <= 1.02) { currentPanX = 0;
                    currentPanY = 0; }
                applyTransform();
            });
            document.getElementById("prevBtn").addEventListener("click", function() {
                if (bookReady) $flipbook.turn("previous");
            });
            document.getElementById("nextBtn").addEventListener("click", function() {
                if (bookReady) $flipbook.turn("next");
            });

            document.getElementById("downloadPDF").addEventListener("click", function() {
                const link = document.createElement("a");
                link.href = "Slock Catalog.pdf";
                link.download = "Slock Catalog.pdf";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            document.addEventListener("keydown", function(e) {
                if (!bookReady) return;
                if (e.key === "ArrowLeft") $flipbook.turn("previous");
                if (e.key === "ArrowRight") $flipbook.turn("next");
            });

            // --- Resize handling ---
            let resizeDebounce = null;
            let lastKnownDisplayMode = getDisplayMode();

            window.addEventListener("resize", function() {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(function() {
                    const newDisplayMode = getDisplayMode();
                    if (newDisplayMode !== lastKnownDisplayMode) {
                        // Display mode changed – reinitialize
                        const currentPage = bookReady ? $flipbook.turn("page") : 1;
                        lastKnownDisplayMode = newDisplayMode;
                        initFlipbook(newDisplayMode, currentPage);
                    } else if (bookReady) {
                        // Same mode – just update size
                        const newSize = getOptimalBookSize(newDisplayMode);
                        $flipbook.turn("size", newSize.width, newSize.height);
                        resetZoomAndPan();
                    }
                }, 300);
            });

            // --- Kickstart ---
            lastKnownDisplayMode = getDisplayMode();
            buildAllPageElements();
            startInitialLoading();

            // Safety fallback (6s)
            setTimeout(function() {
                if (torxLoader && torxLoader.style.display !== "none") {
                    if (!bookReady) initFlipbookEarly();
                    torxLoader.style.opacity = "0";
                    setTimeout(() => { if (torxLoader) torxLoader.style.display = "none"; }, 400);
                }
            }, 6000);

            // Show zoom hint briefly on first interaction
            setTimeout(function() {
                zoomHint.classList.add("visible");
                setTimeout(() => zoomHint.classList.remove("visible"), 4000);
            }, 2000);
        })();
    </script>
</body>
