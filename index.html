<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      font-family: 'Inter', sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      min-height: 70px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 99999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .left-tools,
    .right-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .page-indicator {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      min-width: 85px;
      text-align: center;
    }

    .control-btn {
      border: none;
      height: 42px;
      min-width: 42px;
      padding: 0 18px;
      border-radius: 30px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(4px);
      color: #f1f5f9;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .control-btn:hover {
      background: #334155;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .control-btn:active {
      transform: scale(0.96);
      background: #1e293b;
    }

    @media (max-width: 680px) {
      .topbar {
        padding: 10px 16px;
        gap: 10px;
        min-height: 60px;
      }

      .brand {
        font-size: 1.1rem;
      }

      .control-btn {
        height: 36px;
        min-width: 36px;
        padding: 0 12px;
        font-size: 0.75rem;
      }

      .page-indicator {
        padding: 4px 10px;
        font-size: 0.75rem;
        min-width: 70px;
      }
    }

    .book-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #020617;
      touch-action: none;
    }

    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      will-change: transform;
      transform-origin: center center;
    }

    #flipbook {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      background: #111827;
    }

    /* No spinner for first page, just a background */
    .page-placeholder {
      width: 100%;
      height: 100%;
      background: #111827;
    }

    .page-loader {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .zoom-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #cbd5e6;
      pointer-events: none;
      z-index: 20;
    }

    .torx-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0f172a, #020617);
      z-index: 100000;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      transition: opacity 0.2s ease;
    }

    .torx {
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
    }

    .torx svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px #38bdf8);
    }

    .torx .path {
      stroke: #38bdf8;
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 240;
      stroke-dashoffset: 0;
      animation: dash 1.2s ease-in-out infinite;
    }

    @keyframes dash {
      0% {
        stroke-dashoffset: 240;
      }

      50% {
        stroke-dashoffset: 80;
      }

      100% {
        stroke-dashoffset: 240;
      }
    }

    .loader-text {
      position: absolute;
      bottom: 30%;
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      width: 100%;
    }

    @media (max-width: 768px) {
      .torx {
        width: 55px;
        height: 55px;
      }

      .loader-text {
        font-size: 0.7rem;
        bottom: 25%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="left-tools">
        <div class="brand">SLOCK</div>
      </div>
      <div class="right-tools">
        <button class="control-btn" id="prevBtn">◀</button>
        <div class="page-indicator" id="pageCounter">1 / 36</div>
        <button class="control-btn" id="nextBtn">▶</button>
        <button class="control-btn" id="zoomOutBtn">−</button>
        <button class="control-btn" id="zoomInBtn">+</button>
        <button class="control-btn" id="downloadPDF">PDF</button>
      </div>
    </div>
    <div class="book-area" id="bookArea">
      <div class="zoom-container" id="zoomContainer">
        <div id="flipbook"></div>
      </div>
      <div class="zoom-hint">Pinch zoom · Drag pan · Double‑tap reset · Swipe to flip</div>
    </div>
  </div>

  <div id="torxLoader" class="torx-loader">
    <div class="torx"><svg viewBox="0 0 100 100">
        <path class="path"
          d="M50 10 L62 25 L50 40 L38 25 Z M50 60 L62 75 L50 90 L38 75 Z M10 35 L25 47 L10 59 L25 71 M90 35 L75 47 L90 59 L75 71"
          stroke="currentColor" stroke-width="2" fill="none" />
        <circle cx="50" cy="50" r="8" stroke="currentColor" stroke-width="2" fill="none" />
        <path class="path"
          d="M50 10 L62 25 L50 40 L38 25 Z M50 60 L62 75 L50 90 L38 75 Z M10 35 L25 47 L10 59 L25 71 M90 35 L75 47 L90 59 L75 71"
          stroke="#38bdf8" stroke-width="2.5" fill="none" />
      </svg></div>
    <div class="loader-text">LOADING</div>
  </div>

  <audio id="flipSound" preload="auto" crossorigin="anonymous">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    (function () {
      const TOTAL = 36;
      const IMG_PATH = "images/";
      const EXT = "webp";

      const $book = $("#flipbook");
      const bookArea = document.getElementById("bookArea");
      const zoomContainer = document.getElementById("zoomContainer");
      const torx = document.getElementById("torxLoader");
      let bookReady = false;

      // Preload first page image immediately (critical)
      const firstPageImg = new Image();
      firstPageImg.crossOrigin = "anonymous";
      firstPageImg.src = `${IMG_PATH}page1.${EXT}`;

      // Preload pages 2 and 3 in background
      const preloadOthers = [2, 3];
      preloadOthers.forEach(p => {
        const img = new Image();
        img.src = `${IMG_PATH}page${p}.${EXT}`;
      });

      // Create pages: page1 gets a placeholder div (no spinner), others get spinner
      for (let i = 1; i <= TOTAL; i++) {
        const $page = $("<div class='page'></div>");
        if (i === 1) {
          // Add a simple background placeholder (no spinner)
          $page.append($("<div class='page-placeholder'></div>"));
        } else {
          $page.append($("<div class='page-loader'></div>"));
        }
        $book.append($page);
      }

      // Replace page1 placeholder with real image as soon as it loads
      firstPageImg.onload = () => {
        const $firstPage = $book.find(".page:first-child");
        $firstPage.find(".page-placeholder").remove();
        const $img = $("<img>").attr("src", firstPageImg.src).attr("crossorigin", "anonymous");
        $firstPage.append($img);
        // Hide torx loader immediately when first image is ready
        hideTorxNow();
      };
      firstPageImg.onerror = () => {
        const $firstPage = $book.find(".page:first-child");
        $firstPage.find(".page-placeholder").remove();
        $firstPage.html(`<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white;">⚠️ 1</div>`);
        hideTorxNow();
      };

      // Load remaining pages (2..36) asynchronously
      for (let i = 2; i <= TOTAL; i++) {
        const $page = $book.find(`.page:eq(${i - 1})`);
        loadPageImage(i, $page);
      }

      function loadPageImage(num, $page) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          $page.find(".page-loader").remove();
          $page.find("img").remove();
          const $img = $("<img>").attr("src", img.src).attr("crossorigin", "anonymous");
          $page.append($img);
          if (bookReady && $book.turn("is")) {
            const current = $book.turn("page");
            $book.turn("page", current); // refresh if needed
          }
        };
        img.onerror = () => {
          $page.find(".page-loader").remove();
          $page.html(`<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white;">⚠️ ${num}</div>`);
        };
        img.src = `${IMG_PATH}page${num}.${EXT}`;
      }

      // Audio unlock
      const flipSound = document.getElementById("flipSound");
      let audioUnlocked = false;
      function unlockAudio() {
        if (audioUnlocked) return;
        if (flipSound) flipSound.play().then(() => { flipSound.pause(); flipSound.currentTime = 0; audioUnlocked = true; }).catch(() => { });
        audioUnlocked = true;
      }
      document.body.addEventListener("touchstart", unlockAudio, { once: true });
      document.body.addEventListener("click", unlockAudio, { once: true });
      function playFlipSound() { if (flipSound && audioUnlocked) { flipSound.pause(); flipSound.currentTime = 0; flipSound.volume = 0.65; flipSound.play().catch(() => { }); } }

      // Flipbook init
      function getBookSize() {
        const rect = bookArea.getBoundingClientRect();
        let maxW = rect.width * 0.92, maxH = rect.height * 0.92;
        const ratio = 0.707;
        let w = maxW, h = w / ratio;
        if (h > maxH) { h = maxH; w = h * ratio; }
        return { width: Math.floor(w), height: Math.floor(h) };
      }
      function updateCounter(p) { document.getElementById("pageCounter").innerText = `${p} / ${TOTAL}`; }
      function initBook() {
        if (bookReady) return;
        const sz = getBookSize();
        if (sz.width < 50 || sz.height < 50) { setTimeout(initBook, 30); return; }
        $book.turn({
          width: sz.width, height: sz.height,
          autoCenter: true, display: "single",
          acceleration: true, gradients: true, elevation: 45, duration: 500,
          when: {
            turning: () => playFlipSound(),
            turned: (e, page) => updateCounter(page)
          }
        });
        updateCounter(1);
        bookReady = true;
        resetZoomPan();
        window.addEventListener("resize", () => {
          if ($book.turn("is")) {
            setTimeout(() => {
              const ns = getBookSize();
              $book.turn("size", ns.width, ns.height);
              resetZoomPan();
            }, 80);
          }
        });
      }
      setTimeout(initBook, 20);

      // Hide torx loader as soon as page1 image loads OR max 250ms
      let torxHidden = false;
      function hideTorxNow() {
        if (torxHidden) return;
        torxHidden = true;
        if (torx) {
          torx.style.opacity = "0";
          setTimeout(() => { torx.style.display = "none"; }, 200);
        }
      }
      // Fallback hide after 250ms
      setTimeout(hideTorxNow, 250);

      // Zoom, pan, swipe, double-tap (fully functional)
      let zoom = 1, panX = 0, panY = 0;
      let initZoom = 1, initPanX = 0, initPanY = 0;
      let pinchDist = 0, pinching = false, panning = false;
      let lastX = 0, lastY = 0, lastPanX = 0, lastPanY = 0;
      let lastTap = 0, lastTapX = 0, lastTapY = 0, tapTimer = null;
      let swipeStart = 0, swipeActive = false;

      function applyTransform() {
        zoomContainer.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${zoom})`;
        if (zoom > 1.02) $book.css("pointer-events", "none");
        else { $book.css("pointer-events", "auto"); if (panX !== 0 || panY !== 0) { panX = 0; panY = 0; zoomContainer.style.transform = "scale(1) translate3d(0,0,0)"; } }
      }
      function resetZoomPan() { zoom = 1; panX = 0; panY = 0; applyTransform(); }
      function getDist(t) { if (t.length < 2) return 0; const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.hypot(dx, dy); }

      bookArea.addEventListener("touchstart", (e) => {
        if (!bookReady) return;
        const t = e.touches;
        if (t.length === 1 && !pinching && !panning) {
          const now = Date.now(), tx = t[0].clientX, ty = t[0].clientY;
          if (now - lastTap < 300 && Math.hypot(tx - lastTapX, ty - lastTapY) < 40) {
            resetZoomPan(); e.preventDefault(); if (tapTimer) clearTimeout(tapTimer); lastTap = 0; return;
          } else { lastTap = now; lastTapX = tx; lastTapY = ty; if (tapTimer) clearTimeout(tapTimer); tapTimer = setTimeout(() => { lastTap = 0; }, 300); }
        }
        if (t.length === 2) { pinching = true; pinchDist = getDist(t); initZoom = zoom; initPanX = panX; initPanY = panY; e.preventDefault(); }
        else if (t.length === 1) {
          if (zoom > 1.02) { panning = true; lastX = t[0].clientX; lastY = t[0].clientY; lastPanX = panX; lastPanY = panY; e.preventDefault(); }
          else { swipeStart = t[0].clientX; swipeActive = true; }
        }
      });
      bookArea.addEventListener("touchmove", (e) => {
        if (!bookReady) return;
        const t = e.touches;
        if (pinching && t.length === 2) {
          const newDist = getDist(t);
          if (pinchDist > 0) {
            let s = newDist / pinchDist;
            let newZ = initZoom * s;
            newZ = Math.min(4.0, Math.max(1.0, newZ));
            if (newZ !== zoom) { zoom = newZ; panX = initPanX; panY = initPanY; applyTransform(); }
          }
          e.preventDefault();
        } else if (panning && t.length === 1) {
          const dx = t[0].clientX - lastX, dy = t[0].clientY - lastY;
          if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
            panX = lastPanX + dx; panY = lastPanY + dy;
            const rect = bookArea.getBoundingClientRect(), flipRect = document.getElementById("flipbook").getBoundingClientRect();
            const sw = flipRect.width * zoom, sh = flipRect.height * zoom;
            const maxX = Math.max(0, (sw - rect.width) / 2), maxY = Math.max(0, (sh - rect.height) / 2);
            panX = Math.min(maxX, Math.max(-maxX, panX)); panY = Math.min(maxY, Math.max(-maxY, panY));
            applyTransform();
          }
          e.preventDefault();
        } else if (swipeActive && t.length === 1 && zoom <= 1.02) {
          const dx = t[0].clientX - swipeStart;
          if (Math.abs(dx) > 20) e.preventDefault();
        }
      });
      bookArea.addEventListener("touchend", (e) => {
        if (swipeActive && zoom <= 1.02 && !pinching && !panning) {
          const ch = e.changedTouches[0];
          if (ch && swipeStart !== 0) {
            const dx = ch.clientX - swipeStart;
            if (Math.abs(dx) > 50) { if (dx > 0) $book.turn("previous"); else $book.turn("next"); }
          }
        }
        pinching = false; panning = false; swipeActive = false; pinchDist = 0;
      });

      document.getElementById("zoomInBtn").addEventListener("click", () => { if (bookReady) { zoom = Math.min(4.0, zoom + 0.2); if (zoom <= 1.02) { panX = 0; panY = 0; } applyTransform(); } });
      document.getElementById("zoomOutBtn").addEventListener("click", () => { if (bookReady) { zoom = Math.max(1.0, zoom - 0.2); if (zoom <= 1.02) { panX = 0; panY = 0; } applyTransform(); } });
      document.getElementById("prevBtn").addEventListener("click", () => { if (bookReady) $book.turn("previous"); });
      document.getElementById("nextBtn").addEventListener("click", () => { if (bookReady) $book.turn("next"); });

      document.getElementById("downloadPDF").addEventListener("click", async function () {
        const btn = this, orig = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = "📄 Preparing...";
        try {
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
          const w = pdf.internal.pageSize.getWidth(), h = pdf.internal.pageSize.getHeight();
          async function getImg(pg) {
            return new Promise((res, rej) => {
              const img = new Image(); img.crossOrigin = "anonymous";
              img.onload = () => res(img); img.onerror = () => rej(new Error(`Missing ${pg}`));
              img.src = `${IMG_PATH}page${pg}.${EXT}`;
            });
          }
          for (let i = 1; i <= TOTAL; i++) {
            btn.innerHTML = `📄 ${i}/${TOTAL}`;
            const img = await getImg(i);
            const canvas = document.createElement("canvas"), ctx = canvas.getContext("2d");
            canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const imgData = canvas.toDataURL("image/jpeg", 0.95);
            if (i > 1) pdf.addPage();
            pdf.addImage(imgData, "JPEG", 0, 0, w, h);
          }
          btn.innerHTML = "💾 Saving..."; pdf.save("slock_catalog.pdf"); btn.innerHTML = "✅ Done!";
          setTimeout(() => { btn.innerHTML = orig; }, 1500);
        } catch (err) { alert("PDF error: " + err.message); btn.innerHTML = orig; }
        finally { btn.disabled = false; }
      });

      document.addEventListener("keydown", (e) => { if (bookReady) { if (e.key === "ArrowLeft") $book.turn("previous"); if (e.key === "ArrowRight") $book.turn("next"); } });
    })();
  </script>
</body>

</html>
