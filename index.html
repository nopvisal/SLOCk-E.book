<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />

  <title>SLOCK E-BOOK</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      font-family: Arial, sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      height: 65px;
      background: rgba(15, 23, 42, 0.96);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 18px;

      z-index: 9999;
    }

    .brand {
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      border: none;
      background: #1e293b;
      color: white;

      height: 40px;
      min-width: 40px;

      border-radius: 999px;

      cursor: pointer;

      padding: 0 14px;

      font-size: 14px;
    }

    button:active {
      transform: scale(0.96);
    }

    .page-indicator {
      color: white;
      min-width: 70px;
      text-align: center;
      font-size: 14px;
    }

    /* BOOK */
    .book-area {
      flex: 1;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .zoom-container {
      width: 100%;
      height: 100%;

      display: flex;
      align-items: center;
      justify-content: center;

      transform-origin: center center;
      will-change: transform;
    }

    #flipbook {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .page {
      background: #111827;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;

      display: block;

      pointer-events: none;

      content-visibility: auto;

      backface-visibility: hidden;

      transform: translateZ(0);

      will-change: transform;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;

      background: #020617;

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;

      z-index: 999999;

      font-size: 18px;
      letter-spacing: 3px;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 0 12px;
      }

      button {
        height: 34px;
        min-width: 34px;
        font-size: 12px;
      }

      .page-indicator {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <div class="topbar">

      <div class="brand">
        SLOCK
      </div>

      <div class="controls">

        <button id="prevBtn">◀</button>

        <div
          class="page-indicator"
          id="pageCounter">
          1 / 36
        </div>

        <button id="nextBtn">▶</button>

        <button id="zoomOutBtn">−</button>

        <button id="zoomInBtn">+</button>

      </div>

    </div>

    <div
      class="book-area"
      id="bookArea">

      <div
        class="zoom-container"
        id="zoomContainer">

        <div id="flipbook"></div>

      </div>

    </div>

  </div>

  <div
    class="loader"
    id="loader">

    LOADING...

  </div>

  <script>

    (() => {

      // ===============================
      // CONFIG
      // ===============================

      const TOTAL = 36;

      const IMG_PATH = "images/";

      const EXT = "webp";

      const $book =
        $("#flipbook");

      const loader =
        document.getElementById(
          "loader"
        );

      const bookArea =
        document.getElementById(
          "bookArea"
        );

      const zoomContainer =
        document.getElementById(
          "zoomContainer"
        );

      let bookReady = false;

      // ===============================
      // CREATE PAGES
      // ===============================

      for (
        let i = 1;
        i <= TOTAL;
        i++
      ) {

        $("<div class='page'></div>")
          .appendTo($book);
      }

      // ===============================
      // BOOK SIZE
      // ===============================

      function getBookSize() {

        const rect =
          bookArea.getBoundingClientRect();

        let maxW =
          rect.width * 0.92;

        let maxH =
          rect.height * 0.92;

        const ratio = 0.707;

        let w = maxW;

        let h = w / ratio;

        if (h > maxH) {

          h = maxH;

          w = h * ratio;
        }

        return {
          width: Math.floor(w),
          height: Math.floor(h)
        };
      }

      // ===============================
      // PAGE COUNTER
      // ===============================

      function updateCounter(page) {

        document.getElementById(
          "pageCounter"
        ).innerText =
          `${page} / ${TOTAL}`;
      }

      // ===============================
      // INIT FLIPBOOK
      // ===============================

      function initFlipbook() {

        if (bookReady) return;

        const sz =
          getBookSize();

        $book.turn({

          width: sz.width,

          height: sz.height,

          autoCenter: true,

          display: "single",

          acceleration: true,

          gradients: true,

          elevation: 45,

          duration: 500,

          when: {

            turned: (
              e,
              page
            ) => {

              updateCounter(page);
            }
          }
        });

        updateCounter(1);

        bookReady = true;

        window.addEventListener(
          "resize",
          () => {

            const ns =
              getBookSize();

            $book.turn(
              "size",
              ns.width,
              ns.height
            );
          }
        );
      }

      // ===============================
      // FIXED STABLE LOADER
      // ===============================

      const loadedPages =
        new Set();

      const loadingPages =
        new Set();

      async function preloadImage(
        num,
        priority = false
      ) {

        if (
          loadedPages.has(num)
        ) {
          return;
        }

        if (
          loadingPages.has(num)
        ) {
          return;
        }

        loadingPages.add(num);

        return new Promise(
          (resolve) => {

            const img =
              new Image();

            img.crossOrigin =
              "anonymous";

            img.decoding =
              "sync";

            if (priority) {

              img.fetchPriority =
                "high";
            }

            img.onload = () => {

              const $page =
                $book.find(
                  `.page:eq(${num - 1})`
                );

              if (
                $page.length &&
                !$page.find("img").length
              ) {

                const pageImg =
                  $("<img>")
                    .attr(
                      "src",
                      img.src
                    )
                    .attr(
                      "draggable",
                      "false"
                    );

                $page.empty()
                  .append(pageImg);
              }

              loadedPages.add(num);

              loadingPages.delete(num);

              resolve();
            };

            img.onerror = () => {

              loadingPages.delete(num);

              const $page =
                $book.find(
                  `.page:eq(${num - 1})`
                );

              $page.html(`
                <div style="
                  width:100%;
                  height:100%;
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  color:white;
                  background:#111827;
                ">
                  Failed ${num}
                </div>
              `);

              resolve();
            };

            img.src =
              `${IMG_PATH}page${num}.${EXT}`;
          }
        );
      }

      // ===============================
      // SAFE BATCH LOADER
      // ===============================

      async function loadPagesInBatches(
        pages,
        batchSize = 2
      ) {

        for (
          let i = 0;
          i < pages.length;
          i += batchSize
        ) {

          const batch =
            pages.slice(
              i,
              i + batchSize
            );

          await Promise.all(
            batch.map(page =>
              preloadImage(page)
            )
          );

          // IMPORTANT
          // prevents mobile throttling
          await new Promise(
            r =>
              setTimeout(
                r,
                120
              )
          );
        }
      }

      // ===============================
      // START
      // ===============================

      (async () => {

        // FIRST PAGES
        await Promise.all([
          preloadImage(1, true),
          preloadImage(2, true),
          preloadImage(3, true),
          preloadImage(4, true)
        ]);

        // HIDE LOADER
        loader.style.display =
          "none";

        // START BOOK
        initFlipbook();

        // REMAINING
        const remaining = [];

        for (
          let i = 5;
          i <= TOTAL;
          i++
        ) {

          remaining.push(i);
        }

        // SAFE LOADING
        await loadPagesInBatches(
          remaining,
          2
        );

      })();

      // ===============================
      // BUTTONS
      // ===============================

      document.getElementById(
        "prevBtn"
      ).addEventListener(
        "click",
        () => {

          if (bookReady) {

            $book.turn(
              "previous"
            );
          }
        }
      );

      document.getElementById(
        "nextBtn"
      ).addEventListener(
        "click",
        () => {

          if (bookReady) {

            $book.turn(
              "next"
            );
          }
        }
      );

      // ===============================
      // KEYBOARD
      // ===============================

      document.addEventListener(
        "keydown",
        (e) => {

          if (!bookReady) return;

          if (
            e.key ===
            "ArrowLeft"
          ) {

            $book.turn(
              "previous"
            );
          }

          if (
            e.key ===
            "ArrowRight"
          ) {

            $book.turn(
              "next"
            );
          }
        }
      );

      // ===============================
      // SIMPLE ZOOM
      // ===============================

      let zoom = 1;

      function applyZoom() {

        zoomContainer.style.transform =
          `scale(${zoom})`;
      }

      document.getElementById(
        "zoomInBtn"
      ).addEventListener(
        "click",
        () => {

          zoom = Math.min(
            4,
            zoom + 0.2
          );

          applyZoom();
        }
      );

      document.getElementById(
        "zoomOutBtn"
      ).addEventListener(
        "click",
        () => {

          zoom = Math.max(
            1,
            zoom - 0.2
          );

          applyZoom();
        }
      );

      // ===============================
      // PINCH ZOOM
      // ===============================

      let startDist = 0;

      let startZoom = 1;

      function getDistance(
        touches
      ) {

        const dx =
          touches[0].clientX -
          touches[1].clientX;

        const dy =
          touches[0].clientY -
          touches[1].clientY;

        return Math.hypot(
          dx,
          dy
        );
      }

      bookArea.addEventListener(
        "touchstart",
        (e) => {

          if (
            e.touches.length === 2
          ) {

            startDist =
              getDistance(
                e.touches
              );

            startZoom = zoom;
          }
        },
        { passive: false }
      );

      bookArea.addEventListener(
        "touchmove",
        (e) => {

          if (
            e.touches.length === 2
          ) {

            const dist =
              getDistance(
                e.touches
              );

            zoom = Math.min(
              4,
              Math.max(
                1,
                startZoom *
                (
                  dist /
                  startDist
                )
              )
            );

            applyZoom();

            e.preventDefault();
          }

        },
        { passive: false }
      );

    })();

  </script>

</body>

</html>
