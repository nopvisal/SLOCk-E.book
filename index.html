<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      position: fixed;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      padding-top: max(env(safe-area-inset-top), 12px);
      padding-bottom: max(env(safe-area-inset-bottom), 12px);
      padding-left: max(env(safe-area-inset-left), 0px);
      padding-right: max(env(safe-area-inset-right), 0px);
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOPBAR */
    .topbar {
      width: 100%;
      min-height: 64px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 99999;
      position: relative;
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .page-indicator {
      color: #cbd5e1;
      font-size: 14px;
      min-width: 70px;
      text-align: center;
    }

    .control-btn {
      border: none;
      outline: none;
      height: 40px;
      min-width: 40px;
      padding: 0 14px;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .control-btn:hover {
      background: #334155;
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    /* BOOK AREA with ZOOM CONTAINER */
    .book-area {
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: #020617;
    }

    /* ZOOM CONTAINER — handles pinch & pan transforms */
    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;          /* disable native browser zoom/pan, we handle manually */
      will-change: transform;
      cursor: grab;
      transition: transform 0.05s linear;
    }

    .zoom-container:active {
      cursor: grabbing;
    }

    #flipbook {
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      transition: box-shadow 0.2s;
    }

    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
      background: #111827;
    }

    /* reset button style for touch */
    @media (max-width: 768px) {
      .topbar {
        min-height: 58px;
        padding: 10px;
      }
      .brand {
        font-size: 15px;
      }
      .control-btn {
        height: 34px;
        min-width: 34px;
        font-size: 11px;
        padding: 0 10px;
      }
      .page-indicator {
        font-size: 12px;
        min-width: 50px;
      }
    }

    /* small hint for zoom (optional) */
    .zoom-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      color: #cbd5e6;
      pointer-events: none;
      z-index: 10;
      font-weight: 500;
      letter-spacing: 0.3px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left-tools">
      <div class="brand">SLOCK Catalog</div>
    </div>
    <div class="right-tools">
      <button class="control-btn" id="prevBtn"> ◀ </button>
      <div class="page-indicator" id="pageCounter">1 / 36</div>
      <button class="control-btn" id="nextBtn"> ▶ </button>
      <button class="control-btn" id="zoomOut"> − </button>
      <button class="control-btn" id="zoomIn"> + </button>
      <button class="control-btn" id="downloadPDF"> PDF </button>
    </div>
  </div>

  <div class="book-area">
    <div id="zoomContainer" class="zoom-container">
      <div id="flipbook"></div>
    </div>
    <div class="zoom-hint">✌️ pinch to zoom · drag to pan</div>
  </div>
</div>

<audio id="flipSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>
  // ========================== CONFIG ==========================
  const TOTAL_PAGES = 36;
  const IMAGE_FOLDER = "images/";
  const IMAGE_EXT = "jpg";

  // DOM elements
  const flipbook = $("#flipbook");
  const zoomContainer = document.getElementById("zoomContainer");
  let loadedPages = 0;

  // ========== ZOOM & PAN STATE (hand zoomable) ==========
  let currentZoom = 1.0;
  let panX = 0, panY = 0;
  const MIN_ZOOM = 0.6;
  const MAX_ZOOM = 4.0;

  // Touch state for pinch & pan
  let activeTouches = [];
  let initialPinchDistance = 0;
  let initialZoom = 1;
  let initialPanX = 0, initialPanY = 0;
  let isPinching = false;
  let isPanning = false;
  let lastPanX = 0, lastPanY = 0;
  let lastTouchTime = 0;
  let lastTapPos = null;

  // swipe-to-turn condition (only when zoom <= 1.05 and not panning)
  let touchStartX = 0, touchStartY = 0;
  let touchMovedForSwipe = false;

  // ========== BUILD PAGES ==========
  for (let i = 1; i <= TOTAL_PAGES; i++) {
    const page = $("<div class='page'></div>");
    const img = $("<img>");
    img.attr("src", `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`);
    img.attr("crossorigin", "anonymous");
    img.on("load", () => {
      loadedPages++;
      if (loadedPages === TOTAL_PAGES) initBook();
    });
    img.on("error", () => {
      page.html(`<div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:white; font-size:22px; background:#111827;"> Missing ${i} </div>`);
      loadedPages++;
      if (loadedPages === TOTAL_PAGES) initBook();
    });
    page.append(img);
    flipbook.append(page);
  }

  // ========== HELPER: get dynamic book size (responsive, A4 ratio) ==========
  function getBookSize() {
    const topbar = document.querySelector(".topbar");
    const toolbarHeight = topbar.offsetHeight;
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight - toolbarHeight;
    const ratio = 0.707; // A4 aspect
    let width = screenWidth;
    let height = width / ratio;
    if (height > screenHeight) {
      height = screenHeight;
      width = height * ratio;
    }
    width *= 0.995;
    height *= 0.995;
    return { width: Math.floor(width), height: Math.floor(height) };
  }

  // ========== APPLY TRANSFORM (zoom + pan) ==========
  function applyZoomPanTransform() {
    if (!zoomContainer) return;
    // Clamp zoom
    currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, currentZoom));
    // Optional boundary clamping for pan (avoid empty space)
    const containerRect = zoomContainer.parentElement?.getBoundingClientRect();
    const flipRect = document.getElementById("flipbook")?.getBoundingClientRect();
    if (containerRect && flipRect && currentZoom > 1.0) {
      const scaledWidth = flipRect.width * currentZoom;
      const scaledHeight = flipRect.height * currentZoom;
      const maxPanX = Math.max(0, (scaledWidth - containerRect.width) / 2);
      const maxPanY = Math.max(0, (scaledHeight - containerRect.height) / 2);
      panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
      panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
    } else if (currentZoom <= 1.05) {
      // reset pan when near normal zoom
      panX = 0;
      panY = 0;
    }
    zoomContainer.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${currentZoom})`;
  }

  // reset zoom & pan to default (1.0, centered)
  function resetZoomAndPan() {
    currentZoom = 1.0;
    panX = 0;
    panY = 0;
    applyZoomPanTransform();
  }

  // update zoom by delta (buttons)
  function modifyZoom(delta) {
    let newZoom = currentZoom + delta;
    newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
    if (newZoom === currentZoom) return;
    currentZoom = newZoom;
    if (currentZoom <= 1.05) {
      panX = 0;
      panY = 0;
    }
    applyZoomPanTransform();
  }

  // ========== FLIPBOOK INIT ==========
  function initBook() {
    const size = getBookSize();
    flipbook.turn({
      width: size.width,
      height: size.height,
      autoCenter: true,
      display: "single",
      acceleration: true,
      gradients: true,
      elevation: 40,
      duration: 500,
      when: {
        turning: function () {
          playFlipSound();
        },
        turned: function (e, page) {
          updateCounter(page);
        }
      }
    });
    updateCounter(1);
    // No legacy swipe, we attach our own advanced gesture engine
  }

  function updateCounter(page) {
    document.getElementById("pageCounter").innerText = `${page} / ${TOTAL_PAGES}`;
  }

  function playFlipSound() {
    const sound = document.getElementById("flipSound");
    sound.pause();
    sound.currentTime = 0;
    sound.volume = 0.65;
    sound.play().catch(() => {});
  }

  // ========== CORE PINCH + PAN GESTURE (hand zoomable) ==========
  function getTouchDistance(touches) {
    if (touches.length < 2) return 0;
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  function getTouchCenter(touches) {
    if (touches.length === 1) return { x: touches[0].clientX, y: touches[0].clientY };
    if (touches.length >= 2) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }
    return { x: 0, y: 0 };
  }

  function onTouchStart(e) {
    e.preventDefault();    // we fully control gestures
    const touches = Array.from(e.touches);
    activeTouches = touches;

    // record page turning detection base (if zoom is near 1)
    if (touches.length === 1 && currentZoom <= 1.08) {
      touchStartX = touches[0].clientX;
      touchStartY = touches[0].clientY;
      touchMovedForSwipe = false;
    } else {
      touchStartX = 0;
      touchStartY = 0;
    }

    // PINCH: two fingers
    if (touches.length === 2) {
      isPinching = true;
      initialPinchDistance = getTouchDistance(touches);
      initialZoom = currentZoom;
      const center = getTouchCenter(touches);
      // store for later correction (optional preserve point)
      initialPanX = panX;
      initialPanY = panY;
      lastPanX = panX;
      lastPanY = panY;
    }
    // PAN (if zoomed enough & single finger) but we'll handle in move
    else if (touches.length === 1 && currentZoom > 1.05) {
      isPanning = true;
      lastPanX = panX;
      lastPanY = panY;
      const touch = touches[0];
      lastTouchX = touch.clientX;
      lastTouchY = touch.clientY;
    } else {
      isPanning = false;
    }
  }

  let lastTouchX = 0, lastTouchY = 0;
  function onTouchMove(e) {
    e.preventDefault();
    const touches = Array.from(e.touches);
    activeTouches = touches;

    // PINCH (two fingers)
    if (touches.length === 2 && isPinching) {
      const newDistance = getTouchDistance(touches);
      if (initialPinchDistance > 0) {
        let scaleFactor = newDistance / initialPinchDistance;
        let newZoom = initialZoom * scaleFactor;
        newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));

        // optional: adjust pan to keep pinch center stable
        if (newZoom !== currentZoom) {
          const currentCenter = getTouchCenter(touches);
          const containerRect = zoomContainer.parentElement.getBoundingClientRect();
          const flipbookEl = document.getElementById("flipbook");
          const flipRect = flipbookEl?.getBoundingClientRect();
          if (flipRect && containerRect) {
            // relative to zoom container
            const relativeX = (currentCenter.x - containerRect.left) / containerRect.width;
            const relativeY = (currentCenter.y - containerRect.top) / containerRect.height;
            const prevZoom = currentZoom;
            currentZoom = newZoom;
            // adjust pan so that the point under fingers stays at same visual location
            if (prevZoom !== 0) {
              panX = (panX + (relativeX * containerRect.width) * (1 - newZoom/prevZoom));
              panY = (panY + (relativeY * containerRect.height) * (1 - newZoom/prevZoom));
            }
          } else {
            currentZoom = newZoom;
          }
          applyZoomPanTransform();
        }
      }
    }
    // PAN (single finger with zoom > 1.05)
    else if (touches.length === 1 && currentZoom > 1.05 && !isPinching) {
      if (!isPanning) {
        isPanning = true;
        lastTouchX = touches[0].clientX;
        lastTouchY = touches[0].clientY;
        lastPanX = panX;
        lastPanY = panY;
        return;
      }
      const dx = touches[0].clientX - lastTouchX;
      const dy = touches[0].clientY - lastTouchY;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        panX = lastPanX + dx;
        panY = lastPanY + dy;
        // boundaries on next apply
        applyZoomPanTransform();
      }
    }
    // detect swipe for page turning (only when zoom <= 1.08 and one finger, not pan mode)
    else if (touches.length === 1 && currentZoom <= 1.08 && !isPinching) {
      const touch = touches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      if (Math.abs(deltaX) > 20 || Math.abs(deltaY) > 20) {
        touchMovedForSwipe = true;
      }
    }
  }

  function onTouchEnd(e) {
    e.preventDefault();
    const remainingTouches = e.touches.length;
    // handle swipe-to-turn only if zoom is near normal and no pinch occurred
    const wasPinching = isPinching;
    if (!wasPinching && currentZoom <= 1.08 && !isPinching && touchStartX !== 0 && touchMovedForSwipe) {
      const finalTouch = e.changedTouches[0];
      if (finalTouch) {
        const deltaX = finalTouch.clientX - touchStartX;
        if (Math.abs(deltaX) > 55) {
          if (deltaX < 0) {
            flipbook.turn("next");
          } else {
            flipbook.turn("previous");
          }
          touchMovedForSwipe = false;
        }
      }
    }

    // Double-tap reset gesture (hand zoom reset)
    if (e.touches.length === 0 && !wasPinching) {
      const now = Date.now();
      if (now - lastTouchTime < 280 && lastTapPos) {
        // double tap detected: reset zoom & pan to 1.0
        resetZoomAndPan();
        lastTouchTime = 0;
        lastTapPos = null;
      } else {
        lastTouchTime = now;
        if (e.changedTouches[0]) {
          lastTapPos = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        }
      }
    }

    // Reset gesture flags
    isPinching = false;
    isPanning = false;
    activeTouches = [];
    initialPinchDistance = 0;
    touchStartX = 0;
    touchStartY = 0;
    touchMovedForSwipe = false;
    // final boundary check for pan
    applyZoomPanTransform();
  }

  // Attach gesture listeners to zoomContainer (full control)
  function attachGestures() {
    if (!zoomContainer) return;
    zoomContainer.addEventListener("touchstart", onTouchStart, { passive: false });
    zoomContainer.addEventListener("touchmove", onTouchMove, { passive: false });
    zoomContainer.addEventListener("touchend", onTouchEnd);
    zoomContainer.addEventListener("touchcancel", onTouchEnd);
    // also prevent mouse contextmenu on container
    zoomContainer.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  // ========== RESIZE HANDLER ==========
  function handleResize() {
    if (!flipbook.turn("is")) return;
    const size = getBookSize();
    flipbook.turn("size", size.width, size.height);
    // Reset zoom & pan on window resize for better UX (prevents weird boundaries)
    resetZoomAndPan();
  }

  // ========== BUTTON ACTIONS ==========
  $("#prevBtn").click(() => {
    if (flipbook.turn("is")) flipbook.turn("previous");
  });
  $("#nextBtn").click(() => {
    if (flipbook.turn("is")) flipbook.turn("next");
  });
  $("#zoomIn").click(() => {
    modifyZoom(0.2);
  });
  $("#zoomOut").click(() => {
    modifyZoom(-0.2);
  });

  // PDF DOWNLOAD (remains untouched, fully compatible)
  $("#downloadPDF").click(async function () {
    const btn = this;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = "📄 Preparing...";
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();

      async function loadImage(pageNumber) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error(`Missing page ${pageNumber}`));
          img.src = `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
        });
      }

      for (let i = 1; i <= TOTAL_PAGES; i++) {
        btn.innerHTML = `📄 ${i}/${TOTAL_PAGES}`;
        const img = await loadImage(i);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = canvas.toDataURL("image/jpeg", 0.95);
        if (i > 1) pdf.addPage();
        pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
      }
      btn.innerHTML = "💾 Saving...";
      pdf.save("slock_catalog.pdf");
      btn.innerHTML = "✅ Done!";
      setTimeout(() => {
        btn.innerHTML = originalText;
      }, 1500);
    } catch (err) {
      console.error(err);
      alert("PDF Error: " + err.message);
      btn.innerHTML = originalText;
    } finally {
      btn.disabled = false;
    }
  });

  // Keyboard arrows
  $(document).keydown((e) => {
    if (e.key === "ArrowLeft") flipbook.turn("previous");
    if (e.key === "ArrowRight") flipbook.turn("next");
  });

  // wait for all pages load then init gestures & resize observer
  let bookInitialized = false;
  function waitForBookAndAttach() {
    if (loadedPages === TOTAL_PAGES && !bookInitialized) {
      bookInitialized = true;
      attachGestures();
      window.addEventListener("resize", () => {
        setTimeout(handleResize, 80);
      });
      // extra initial reset
      setTimeout(() => {
        resetZoomAndPan();
      }, 100);
    } else {
      setTimeout(waitForBookAndAttach, 80);
    }
  }
  waitForBookAndAttach();

  // small fix: after flipbook size changes, keep zoom bounds in check
  function monitorBoundsAfterTurn() {
    if (flipbook.turn("is")) {
      setTimeout(() => {
        if (currentZoom > 1.05) applyZoomPanTransform();
      }, 20);
    }
  }
  $(document).on("turned", "#flipbook", () => {
    monitorBoundsAfterTurn();
  });
</script>
</body>
</html>
