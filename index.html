
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>SLOCK Catalog</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background:#020617;
}

body{
    display:flex;
    flex-direction:column;

    background:
    radial-gradient(circle at top,
    #1e293b 0%,
    #0f172a 45%,
    #020617 100%);
}

.topbar{

    width:100%;
    height:64px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 18px;

    background:rgba(15,23,42,.9);

    backdrop-filter:blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.08);

    flex-shrink:0;

    z-index:9999;
}

.brand{
    color:white;
    font-size:18px;
    font-weight:600;
}

.right-tools{
    display:flex;
    align-items:center;
    gap:10px;
}

.control-btn{

    border:none;
    outline:none;

    height:40px;
    min-width:40px;

    padding:0 14px;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    transition:.2s;
}

.control-btn:hover{
    background:#334155;
}

.page-indicator{
    color:#cbd5e1;
    min-width:70px;
    text-align:center;
}

.book-area{

    flex:1;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

#flipbook{

    box-shadow:
    0 25px 70px rgba(0,0,0,.55);
}

.page{

    background:#111827;

    overflow:hidden;

    position:relative;
}

.zoom-wrapper{

    width:100%;
    height:100%;

    overflow:hidden;

    position:relative;

    touch-action:none;
}

.panzoom-target{

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;
}

.panzoom-target img{

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;

    pointer-events:none;

    -webkit-user-drag:none;
}

@media(max-width:768px){

    .topbar{
        padding:0 10px;
    }

    .brand{
        font-size:15px;
    }

    .control-btn{
        height:34px;
        min-width:34px;
        font-size:11px;
    }
}

</style>
</head>

<body>

<div class="topbar">

    <div class="brand">
        SLOCK Catalog
    </div>

    <div class="right-tools">

        <button class="control-btn" id="prevBtn">
            ◀
        </button>

        <div class="page-indicator" id="pageCounter">
            1 / 1
        </div>

        <button class="control-btn" id="nextBtn">
            ▶
        </button>

        <button class="control-btn" id="downloadPDF">
            PDF
        </button>

    </div>

</div>

<div class="book-area">

    <div id="flipbook"></div>

</div>

<audio id="flipSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>

const TOTAL_PAGES = 36;
const IMAGE_FOLDER = "images/";
const IMAGE_EXT = "jpg";

const flipbook = $("#flipbook");

let loadedPages = 0;

for(let i = 1; i <= TOTAL_PAGES; i++){

    const page =
        $("<div class='page'></div>");

    const wrapper =
        $("<div class='zoom-wrapper'></div>");

    const target =
        $("<div class='panzoom-target'></div>");

    const img =
        $("<img>");

    img.attr(
        "src",
        `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`
    );

    img.on("load",()=>{

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){
            initBook();
        }
    });

    img.on("error",()=>{

        target.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:22px;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){
            initBook();
        }
    });

    target.append(img);

    wrapper.append(target);

    page.append(wrapper);

    flipbook.append(page);
}

function getBookSize(){

    const topbar =
        document.querySelector(".topbar");

    const toolbarHeight =
        topbar.offsetHeight;

    const screenWidth =
        window.innerWidth;

    const screenHeight =
        window.innerHeight - toolbarHeight;

    const ratio = 0.707;

    let width =
        screenWidth;

    let height =
        width / ratio;

    if(height > screenHeight){

        height = screenHeight;

        width = height * ratio;
    }

    width *= 0.98;
    height *= 0.98;

    return{
        width:Math.floor(width),
        height:Math.floor(height)
    };
}

function initBook(){

    const size = getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:60,

        duration:800,

        when:{

            turning:function(){
                playFlipSound();
            },

            turned:function(e,page){
                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    setupZoom();
}

function updateCounter(page){

    document.getElementById(
        "pageCounter"
    ).innerText =
    `${page} / ${TOTAL_PAGES}`;
}

function playFlipSound(){

    const sound =
        document.getElementById("flipSound");

    sound.pause();

    sound.currentTime = 0;

    sound.play().catch(()=>{});
}

$("#prevBtn").click(()=>{
    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{
    flipbook.turn("next");
});

function setupZoom(){

    const wrappers =
        document.querySelectorAll(
            ".zoom-wrapper"
        );

    wrappers.forEach(wrapper=>{

        const target =
            wrapper.querySelector(
                ".panzoom-target"
            );

        const panzoom =
            Panzoom(target,{

                maxScale:5,

                minScale:1,

                contain:"outside"
            });

        // ============================
        // IMPORTANT FIX
        // ============================

        let isZooming = false;

        wrapper.addEventListener(

            "touchstart",

            function(e){

                // 2 fingers = zoom mode

                if(e.touches.length === 2){

                    isZooming = true;

                    flipbook.turn(
                        "disable",
                        true
                    );
                }
            },

            { passive:false }
        );

        wrapper.addEventListener(

            "touchmove",

            function(e){

                if(isZooming){

                    e.preventDefault();

                    panzoom.handleTouch(e);
                }

            },

            { passive:false }
        );

        wrapper.addEventListener(

            "touchend",

            function(){

                // re-enable swipe

                if(
                    panzoom.getScale() <= 1
                ){

                    isZooming = false;

                    flipbook.turn(
                        "disable",
                        false
                    );
                }
            }
        );

        // wheel zoom

        wrapper.addEventListener(

            "wheel",

            function(e){

                e.preventDefault();

                panzoom.zoomWithWheel(e);
            }
        );

        // double click zoom

        wrapper.addEventListener(

            "dblclick",

            function(e){

                e.preventDefault();

                const scale =
                    panzoom.getScale();

                if(scale > 1){

                    panzoom.reset();

                    flipbook.turn(
                        "disable",
                        false
                    );

                    isZooming = false;

                }else{

                    panzoom.zoom(2,{ animate:true });
                }
            }
        );
    });
}

// PDF

$("#downloadPDF").click(async function(){

    const btn = this;

    const originalText =
        btn.innerHTML;

    btn.disabled = true;

    btn.innerHTML = "Preparing...";

    try{

        const { jsPDF } =
            window.jspdf;

        const pdf = new jsPDF({

            orientation:"portrait",

            unit:"mm",

            format:"a4"
        });

        const pdfWidth =
            pdf.internal.pageSize.getWidth();

        const pdfHeight =
            pdf.internal.pageSize.getHeight();

        for(let i = 1; i <= TOTAL_PAGES; i++){

            btn.innerHTML =
            `${i}/${TOTAL_PAGES}`;

            const img =
                new Image();

            img.src =
            `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`;

            await new Promise(resolve=>{
                img.onload = resolve;
            });

            const canvas =
                document.createElement(
                    "canvas"
                );

            canvas.width =
                img.naturalWidth;

            canvas.height =
                img.naturalHeight;

            const ctx =
                canvas.getContext("2d");

            ctx.drawImage(
                img,
                0,
                0
            );

            const imgData =
                canvas.toDataURL(
                    "image/jpeg",
                    0.95
                );

            if(i > 1){
                pdf.addPage();
            }

            pdf.addImage(
                imgData,
                "JPEG",
                0,
                0,
                pdfWidth,
                pdfHeight
            );
        }

        pdf.save(
            "SLOCK-Catalog.pdf"
        );

        btn.innerHTML = "Done ✓";

        setTimeout(()=>{
            btn.innerHTML = originalText;
        },1500);

    }catch(err){

        console.error(err);

        alert(err.message);

        btn.innerHTML = originalText;

    }finally{

        btn.disabled = false;
    }
});

window.addEventListener(

    "resize",

    ()=>{

        if(!flipbook.turn("is"))
        return;

        setTimeout(()=>{

            const size =
                getBookSize();

            flipbook.turn(
                "size",
                size.width,
                size.height
            );

        },100);
    }
);

</script>

</body>
</html>
