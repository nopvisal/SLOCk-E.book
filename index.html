<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1,
        maximum-scale=1,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>SLOCK Catalog</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#020617;

    position:fixed;

    touch-action:none;
}

body{

    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top,
    #1e293b 0%,
    #0f172a 45%,
    #020617 100%);

    padding-top:max(env(safe-area-inset-top), 12px);

    padding-bottom:max(env(safe-area-inset-bottom), 12px);

    padding-left:max(env(safe-area-inset-left), 0px);

    padding-right:max(env(safe-area-inset-right), 0px);
}

/* =========================================
   APP
========================================= */

.app{

    width:100%;
    height:100%;

    display:flex;

    flex-direction:column;

    overflow:hidden;
}

/* =========================================
   TOPBAR
========================================= */

.topbar{

    width:100%;

    min-height:64px;

    flex-shrink:0;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:12px;

    padding:12px 18px;

    background:rgba(15,23,42,.88);

    backdrop-filter:blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.08);

    z-index:99999;

    position:relative;
}

.left-tools,
.right-tools{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

/* =========================================
   BRAND
========================================= */

.brand{

    color:white;

    font-size:18px;

    font-weight:600;

    letter-spacing:.3px;
}

/* =========================================
   PAGE COUNTER
========================================= */

.page-indicator{

    color:#cbd5e1;

    font-size:14px;

    min-width:70px;

    text-align:center;
}

/* =========================================
   BUTTONS
========================================= */

.control-btn{

    border:none;

    outline:none;

    height:40px;

    min-width:40px;

    padding:0 14px;

    border-radius:12px;

    background:#1e293b;

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:13px;

    font-weight:500;

    cursor:pointer;

    transition:.2s ease;
}

.control-btn:hover{

    background:#334155;
}

.control-btn:active{

    transform:scale(.96);
}

/* =========================================
   BOOK AREA
========================================= */

.book-area{

    flex:1;

    width:100%;

    min-height:0;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:4px;

    position:relative;
}

/* =========================================
   FLIPBOOK
========================================= */

#flipbook{

    box-shadow:
    0 25px 70px rgba(0,0,0,.55);

    touch-action:none;
}

/* =========================================
   PAGE
========================================= */

.page{

    background:#111827;

    overflow:hidden;

    position:relative;

    touch-action:none;
}

/* =========================================
   ZOOM CONTAINER
========================================= */

.zoom-container{

    width:100%;
    height:100%;

    overflow:hidden;

    position:relative;

    touch-action:none;
}

/* =========================================
   ZOOM CONTENT
========================================= */

.zoom-content{

    width:100%;
    height:100%;

    position:absolute;

    top:0;
    left:0;

    transform-origin:center center;

    display:flex;

    justify-content:center;
    align-items:center;

    will-change:transform;
}

/* =========================================
   IMAGE
========================================= */

.zoom-content img{

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;

    pointer-events:none;

    -webkit-user-drag:none;

    background:#111827;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

    .topbar{

        min-height:58px;

        padding:10px;
    }

    .brand{

        font-size:15px;
    }

    .control-btn{

        height:34px;

        min-width:34px;

        font-size:11px;

        padding:0 10px;
    }

    .page-indicator{

        font-size:12px;

        min-width:50px;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- TOPBAR -->

    <div class="topbar">

        <div class="left-tools">

            <div class="brand">
                SLOCK Catalog
            </div>

        </div>

        <div class="right-tools">

            <button class="control-btn" id="prevBtn">
                ◀
            </button>

            <div class="page-indicator" id="pageCounter">
                1 / 1
            </div>

            <button class="control-btn" id="nextBtn">
                ▶
            </button>

        </div>

    </div>

    <!-- BOOK -->

    <div class="book-area">

        <div id="flipbook"></div>

    </div>

</div>

<!-- SOUND -->

<audio id="flipSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>

// ========================================
// CONFIG
// ========================================

const TOTAL_PAGES = 36;

const IMAGE_FOLDER = "images/";

const IMAGE_EXT = "jpg";

// ========================================

const flipbook = $("#flipbook");

let loadedPages = 0;

// ========================================
// CREATE PAGES
// ========================================

for(let i = 1; i <= TOTAL_PAGES; i++){

    const page =
        $("<div class='page'></div>");

    const zoomContainer =
        $("<div class='zoom-container'></div>");

    const zoomContent =
        $("<div class='zoom-content'></div>");

    const img =
        $("<img>");

    img.attr(
        "src",
        `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`
    );

    img.on("load",()=>{

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    img.on("error",()=>{

        zoomContent.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:22px;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(loadedPages === TOTAL_PAGES){

            initBook();
        }
    });

    zoomContent.append(img);

    zoomContainer.append(zoomContent);

    page.append(zoomContainer);

    flipbook.append(page);
}

// ========================================
// RESPONSIVE SIZE
// ========================================

function getBookSize(){

    const topbar =
        document.querySelector(".topbar");

    const toolbarHeight =
        topbar.offsetHeight;

    const screenWidth =
        window.innerWidth;

    const screenHeight =
        window.innerHeight - toolbarHeight;

    const ratio = 0.707;

    let width =
        screenWidth;

    let height =
        width / ratio;

    if(height > screenHeight){

        height = screenHeight;

        width = height * ratio;
    }

    width *= 0.995;

    height *= 0.995;

    return{

        width:Math.floor(width),

        height:Math.floor(height)
    };
}

// ========================================
// INIT BOOK
// ========================================

function initBook(){

    const size =
        getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:40,

        duration:700,

        when:{

            turning:function(){

                playFlipSound();
            },

            turned:function(e,page){

                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    enablePinchZoom();
}

// ========================================
// COUNTER
// ========================================

function updateCounter(page){

    document.getElementById(
        "pageCounter"
    ).innerText =
    `${page} / ${TOTAL_PAGES}`;
}

// ========================================
// SOUND
// ========================================

function playFlipSound(){

    const sound =
        document.getElementById("flipSound");

    sound.pause();

    sound.currentTime = 0;

    sound.volume = 1;

    sound.play().catch(()=>{});
}

// ========================================
// BUTTONS
// ========================================

$("#prevBtn").click(()=>{

    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{

    flipbook.turn("next");
});

// ========================================
// KEYBOARD
// ========================================

$(document).keydown(function(e){

    if(e.key === "ArrowLeft"){

        flipbook.turn("previous");
    }

    if(e.key === "ArrowRight"){

        flipbook.turn("next");
    }
});

// ========================================
// PINCH ZOOM
// ========================================

function enablePinchZoom(){

    const containers =
        document.querySelectorAll(".zoom-container");

    containers.forEach(container=>{

        const content =
            container.querySelector(".zoom-content");

        let scale = 1;

        let startScale = 1;

        let pointX = 0;
        let pointY = 0;

        let startX = 0;
        let startY = 0;

        let initialDistance = 0;

        let isDragging = false;

        // --------------------------------
        // UPDATE
        // --------------------------------

        function updateTransform(){

            content.style.transform =
            `
            translate(${pointX}px, ${pointY}px)
            scale(${scale})
            `;
        }

        // --------------------------------
        // DISTANCE
        // --------------------------------

        function getDistance(touches){

            return Math.hypot(

                touches[0].clientX -
                touches[1].clientX,

                touches[0].clientY -
                touches[1].clientY
            );
        }

        // --------------------------------
        // TOUCH START
        // --------------------------------

        container.addEventListener(

            "touchstart",

            (e)=>{

                // PINCH

                if(e.touches.length === 2){

                    initialDistance =
                        getDistance(e.touches);

                    startScale =
                        scale;
                }

                // DRAG

                if(
                    e.touches.length === 1 &&
                    scale > 1
                ){

                    isDragging = true;

                    startX =
                    e.touches[0].clientX -
                    pointX;

                    startY =
                    e.touches[0].clientY -
                    pointY;
                }

            },

            { passive:false }
        );

        // --------------------------------
        // TOUCH MOVE
        // --------------------------------

        container.addEventListener(

            "touchmove",

            (e)=>{

                // PINCH ZOOM

                if(e.touches.length === 2){

                    e.preventDefault();

                    const currentDistance =
                        getDistance(e.touches);

                    scale =
                        startScale *
                        (
                            currentDistance /
                            initialDistance
                        );

                    scale =
                        Math.max(
                            1,
                            Math.min(scale,5)
                        );

                    updateTransform();
                }

                // DRAG

                if(
                    e.touches.length === 1 &&
                    isDragging &&
                    scale > 1
                ){

                    e.preventDefault();

                    pointX =
                    e.touches[0].clientX -
                    startX;

                    pointY =
                    e.touches[0].clientY -
                    startY;

                    updateTransform();
                }

            },

            { passive:false }
        );

        // --------------------------------
        // TOUCH END
        // --------------------------------

        container.addEventListener(

            "touchend",

            ()=>{

                isDragging = false;

                if(scale <= 1){

                    scale = 1;

                    pointX = 0;
                    pointY = 0;

                    updateTransform();
                }
            }
        );
    });
}

// ========================================
// RESIZE FIX
// ========================================

window.addEventListener("resize",()=>{

    if(!flipbook.turn("is")) return;

    setTimeout(()=>{

        const size =
            getBookSize();

        flipbook.turn(
            "size",
            size.width,
            size.height
        );

    },100);
});

</script>

</body>
</html>
