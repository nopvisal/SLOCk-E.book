<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      font-family: 'Inter', sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      min-height: 70px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 99999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .left-tools,
    .right-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .page-indicator {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      letter-spacing: 0.3px;
      min-width: 85px;
      text-align: center;
    }

    .control-btn {
      border: none;
      outline: none;
      height: 42px;
      min-width: 42px;
      padding: 0 18px;
      border-radius: 30px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(4px);
      color: #f1f5f9;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.2px;
    }

    .control-btn:hover {
      background: #334155;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .control-btn:active {
      transform: scale(0.96);
      background: #1e293b;
    }

    @media (max-width: 680px) {
      .topbar {
        padding: 10px 16px;
        gap: 10px;
        min-height: 60px;
      }

      .left-tools,
      .right-tools {
        gap: 8px;
      }

      .brand {
        font-size: 1rem;
      }

      .control-btn {
        height: 36px;
        min-width: 36px;
        padding: 0 12px;
        font-size: 0.75rem;
      }

      .page-indicator {
        padding: 4px 10px;
        font-size: 0.75rem;
        min-width: 70px;
      }
    }

    .book-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #020617;
      touch-action: none;
    }

    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      will-change: transform;
      transform-origin: center center;
    }

    #flipbook {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      background: #111827;
      transition: opacity 0.2s ease;
    }

    /* blur-up lazy loading effect */
    .page img.lazy-load {
      opacity: 0;
    }

    .page img.loaded {
      opacity: 1;
    }

    .page .loading-placeholder {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(110deg, #1e293b 8%, #2d3a4f 18%, #1e293b 33%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
      z-index: 1;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .zoom-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #cbd5e6;
      pointer-events: none;
      z-index: 20;
      letter-spacing: 0.3px;
    }

    /* ========== MODERN FAST LOADER (SPINNER WITH PROGRESS) ========== */
    .torx-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0f172a, #020617);
      z-index: 100000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      transition: opacity 0.4s ease;
    }

    .torx {
      width: 80px;
      height: 80px;
      position: relative;
      animation: spin 1.2s linear infinite;
    }

    .torx svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.5));
    }

    .torx .path {
      stroke: #38bdf8;
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 240;
      stroke-dashoffset: 0;
      animation: dash 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes dash {
      0% {
        stroke-dashoffset: 240;
      }

      50% {
        stroke-dashoffset: 80;
      }

      100% {
        stroke-dashoffset: 240;
      }
    }

    .loader-text {
      margin-top: 24px;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .loader-progress {
      margin-top: 12px;
      width: 200px;
      height: 3px;
      background: rgba(56, 189, 248, 0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .loader-progress-bar {
      width: 0%;
      height: 100%;
      background: #38bdf8;
      transition: width 0.1s linear;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .torx {
        width: 60px;
        height: 60px;
      }

      .loader-text {
        font-size: 0.75rem;
      }

      .loader-progress {
        width: 160px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="left-tools">
        <div class="brand">SLOCK</div>
      </div>
      <div class="right-tools">
        <button class="control-btn" id="prevBtn" aria-label="Previous page">◀</button>
        <div class="page-indicator" id="pageCounter">1 / 36</div>
        <button class="control-btn" id="nextBtn" aria-label="Next page">▶</button>
        <button class="control-btn" id="zoomOutBtn" aria-label="Zoom out">−</button>
        <button class="control-btn" id="zoomInBtn" aria-label="Zoom in">+</button>
        <button class="control-btn" id="downloadPDF" aria-label="Download PDF">PDF</button>
      </div>
    </div>
    <div class="book-area" id="bookArea">
      <div class="zoom-container" id="zoomContainer">
        <div id="flipbook"></div>
      </div>
      <div class="zoom-hint">· Swipe to flip · Pinch to zoom · Double Tap to Reset </div>
    </div>
  </div>

  <!-- Fast Loader with progress -->
  <div id="torxLoader" class="torx-loader">
    <div class="torx">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path class="path"
          d="M50 10 L62 25 L50 40 L38 25 Z M50 60 L62 75 L50 90 L38 75 Z M10 35 L25 47 L10 59 L25 71 M90 35 L75 47 L90 59 L75 71"
          stroke="#38bdf8" stroke-width="2.5" fill="none" />
        <circle cx="50" cy="50" r="8" stroke="#38bdf8" stroke-width="2" fill="none" />
      </svg>
    </div>
    <div class="loader-text">LOADING HIGH-SPEED CATALOG</div>
    <div class="loader-progress">
      <div class="loader-progress-bar" id="loadProgressBar"></div>
    </div>
    <div class="loader-text" id="progressPercent" style="font-size:0.75rem; margin-top:6px;">0%</div>
  </div>

  <audio id="flipSound" preload="none" crossorigin="anonymous">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3"
      type="audio/mpeg">
  </audio>

  <script>
    (function () {

      const TOTAL_PAGES = 36;
      const IMAGE_FOLDER = "images/";
      const IMAGE_EXT = "webp";

      const PRELOAD_RADIUS = 3;
      const MAX_CONCURRENT = 4;
      const MIN_PAGES_FOR_BOOK = 4;

      const pagesLoaded = new Array(
        TOTAL_PAGES + 1
      ).fill(false);

      const pageElements = [];

      let bookReady = false;
      let activeLoads = 0;
      let preloadQueue = [];

      const $flipbook = $("#flipbook");

      const loader =
        document.getElementById(
          "torxLoader"
        );

      const progressBar =
        document.getElementById(
          "loadProgressBar"
        );

      const progressText =
        document.getElementById(
          "progressPercent"
        );

      const zoomContainer =
        document.getElementById(
          "zoomContainer"
        );

      const bookArea =
        document.getElementById(
          "bookArea"
        );

      function updateProgress() {

        const count =
          pagesLoaded.filter(
            v => v
          ).length;

        const percent = Math.floor(
          count / TOTAL_PAGES * 100
        );

        progressBar.style.width =
          percent + "%";

        progressText.innerText =
          percent + "%";


        /* loader disappears ONLY after page1 */

        if (
          pagesLoaded[1]
          && loader.style.display !== "none"
        ) {

          setTimeout(() => {

            loader.style.opacity = "0";

            setTimeout(() => {

              loader.style.display =
                "none";

            }, 400);

          }, 300);

        }


        if (
          !bookReady &&
          count >= MIN_PAGES_FOR_BOOK
        ) {
          initBook();
        }

      }


      function createPage(n) {

        const page =
          $("<div class='page'></div>");

        const shimmer =
          document.createElement(
            "div"
          );

        shimmer.className =
          "loading-placeholder";

        const img =
          $(
            "<img class='lazy-load'>"
          );

        page.append(shimmer);

        page.append(img);

        pageElements[n] = {

          img: img[0],
          shimmer: shimmer,
          page: page

        };

        return page;

      }



      function loadPage(n) {

        return new Promise(
          (resolve) => {

            if (
              pagesLoaded[n]
            ) {

              resolve();
              return;

            }

            const obj =
              pageElements[n];

            const image =
              new Image();

            const src =
              `${IMAGE_FOLDER}page${n}.${IMAGE_EXT}`;

            image.onload = () => {

              obj.img.src = src;

              obj.img.classList.add(
                "loaded"
              );

              obj.shimmer.remove();

              pagesLoaded[n] = true;

              updateProgress();

              resolve();

            };

            image.onerror = () => {

              pagesLoaded[n] = true;

              obj.shimmer.innerHTML =
                `Page ${n}`;

              updateProgress();

              resolve();

            };

            image.src = src;

          });

      }



      function smartPreload(center) {

        let list = [];

        for (
          let i = Math.max(
            1,
            center - PRELOAD_RADIUS
          );

          i <= Math.min(
            TOTAL_PAGES,
            center + PRELOAD_RADIUS
          );

          i++
        ) {

          if (!pagesLoaded[i]) {

            list.push(i);

          }

        }


        list.sort(
          (a, b) =>
            Math.abs(a - center)
            -
            Math.abs(b - center)
        );


        for (
          const page of list
        ) {

          if (
            activeLoads <
            MAX_CONCURRENT
          ) {

            activeLoads++;

            loadPage(page)
              .finally(() => {

                activeLoads--;

                if (
                  preloadQueue.length
                ) {

                  loadPage(
                    preloadQueue.shift()
                  );

                }

              });

          } else {

            preloadQueue.push(
              page
            );

          }

        }

      }


      for (
        let i = 1;
        i <= TOTAL_PAGES;
        i++
      ) {

        $flipbook.append(
          createPage(i)
        );

      }


      async function start() {

        for (
          let i = 1;
          i <= 6;
          i++
        ) {

          loadPage(i);

        }

        smartPreload(1);

      }

      function getBookSize() {

        const rect =
          bookArea.getBoundingClientRect();

        let w =
          rect.width * .92;

        let h =
          rect.height * .92;

        const ratio = .707;

        if (
          w / ratio > h
        ) {

          w = h * ratio;

        } else {

          h = w / ratio;

        }

        return {

          width:
            Math.floor(w),

          height:
            Math.floor(h)

        };

      }



      function initBook() {

        if (bookReady) return;

        const s =
          getBookSize();

        $flipbook.turn({

          width: s.width,

          height: s.height,

          display: "single",

          autoCenter: true,

          duration: 450,

          gradients: true,

          acceleration: true,

          elevation: 50,

          when: {

            turning: (e, p) => {

              playFlip();

              smartPreload(
                p
              );

            },

            turned: (e, p) => {

              updateCounter(
                p
              );

              smartPreload(
                p
              );

            }

          }

        });

        bookReady = true;

        updateCounter(1);

      }


      function updateCounter(p) {

        document.getElementById(
          "pageCounter"
        ).innerText =
          `${p} / ${TOTAL_PAGES}`;

      }


      const flipSound =
        document.getElementById(
          "flipSound"
        );

      let audioReady = false;

      function unlock() {

        if (audioReady) return;

        flipSound.play()
          .then(() => {

            flipSound.pause();

            flipSound.currentTime = 0;

          })
          .catch(() => { });

        audioReady = true;

      }

      function playFlip() {

        if (!audioReady) return;

        flipSound.pause();

        flipSound.currentTime = 0;

        flipSound.volume = .55;

        flipSound.play()
          .catch(() => { });

      }


      document.body.addEventListener(
        "touchstart",
        unlock,
        { once: true }
      );

      document.body.addEventListener(
        "click",
        unlock,
        { once: true }
      );



      document.getElementById(
        "nextBtn"
      )
        .onclick = () => {

          if (bookReady)
            $flipbook.turn(
              "next"
            );

        };

      document.getElementById(
        "prevBtn"
      )
        .onclick = () => {

          if (bookReady)
            $flipbook.turn(
              "previous"
            );

        };



     document.getElementById("downloadPDF")
.addEventListener("click", async function(){

    const btn=this;
    const original=btn.innerHTML;

    btn.disabled=true;
    btn.innerHTML="📄 Preparing";

    try{

        const {jsPDF}=window.jspdf;

        const pdf=new jsPDF({
            orientation:"portrait",
            unit:"mm",
            format:"a4"
        });

        const pdfWidth=
        pdf.internal.pageSize.getWidth();

        const pdfHeight=
        pdf.internal.pageSize.getHeight();

        for(let i=1;i<=TOTAL_PAGES;i++){

            btn.innerHTML=
            `📄 ${i}/${TOTAL_PAGES}`;

            // Ensure page exists
            const page=pageElements[i];

            if(!page) continue;

            // Force-load image if needed
            if(
                !pagesLoaded[i] ||
                !page.img.complete ||
                page.img.naturalWidth===0
            ){

                await loadPage(i);

                // extra wait for browser render
                await new Promise(
                    r=>setTimeout(r,100)
                );
            }

            const img=page.img;

            if(
                !img ||
                !img.complete ||
                img.naturalWidth===0
            ){
                console.log(
                  "Skipping page:",
                  i
                );
                continue;
            }

            const canvas=
            document.createElement(
                "canvas"
            );

            canvas.width=
            img.naturalWidth;

            canvas.height=
            img.naturalHeight;

            const ctx=
            canvas.getContext("2d");

            ctx.fillStyle="#ffffff";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0
            );

            const imageData=
            canvas.toDataURL(
                "image/jpeg",
                0.95
            );

            if(i>1){
                pdf.addPage();
            }

            pdf.addImage(
                imageData,
                "JPEG",
                0,
                0,
                pdfWidth,
                pdfHeight
            );
        }

        btn.innerHTML="💾 Saving";

        pdf.save(
            "slock_catalog.pdf"
        );

        btn.innerHTML="✅ Done";

    }
    catch(err){

        console.error(
            "PDF ERROR:",
            err
        );

        alert(
          "PDF failed: "
          +err.message
        );

    }

    setTimeout(()=>{

        btn.disabled=false;

        btn.innerHTML=original;

    },1500);

});



      window.addEventListener(
        "resize",
        () => {

          if (
            $flipbook.turn("is")
          ) {

            const s =
              getBookSize();

            $flipbook.turn(
              "size",
              s.width,
              s.height
            );

          }

        });

      start();

    })();
  </script>
</body>

</html>
