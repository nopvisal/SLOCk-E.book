<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <!-- jQuery + turn.js (3D flipbook) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      font-family: 'Inter', sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar – always on top */
    .topbar {
      width: 100%;
      min-height: 64px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 99999;
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .page-indicator {
      color: #cbd5e1;
      font-size: 14px;
      min-width: 70px;
      text-align: center;
      font-weight: 500;
    }

    .control-btn {
      border: none;
      height: 40px;
      min-width: 40px;
      padding: 0 14px;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .control-btn:active { transform: scale(0.96); }

    /* Book area – holds the 3D flipbook */
    .book-area {
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #020617;
    }

    /* Turn.js container – 3D perspective preserved */
    #flipbook {
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      transition: box-shadow 0.2s;
    }

    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
      background: #111827;
    }

    /* responsive adjustments */
    @media (max-width: 768px) {
      .topbar { min-height: 58px; padding: 10px; }
      .brand { font-size: 15px; }
      .control-btn { height: 34px; font-size: 11px; padding: 0 10px; }
      .page-indicator { font-size: 12px; min-width: 50px; }
    }

    /* subtle hint */
    .zoom-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      color: #e2e8f0;
      pointer-events: none;
      z-index: 10;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left-tools">
      <div class="brand">SLOCK Catalog</div>
    </div>
    <div class="right-tools">
      <button class="control-btn" id="prevBtn">◀</button>
      <div class="page-indicator" id="pageCounter">1 / 36</div>
      <button class="control-btn" id="nextBtn">▶</button>
      <button class="control-btn" id="zoomOut">−</button>
      <button class="control-btn" id="zoomIn">+</button>
      <button class="control-btn" id="downloadPDF"> PDF</button>
    </div>
  </div>
  <div class="book-area" id="bookArea">
    <div id="flipbook"></div>
  </div>
  <div class="zoom-hint"> Pinch to zoom book · Swipe to flip pages</div>
</div>

<!-- Realistic book page flip sound (cross‑origin friendly) -->
<audio id="flipSound" preload="auto" crossorigin="anonymous">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // ======================== CONFIGURATION ========================
    const TOTAL_PAGES = 36;
    const IMAGE_FOLDER = "images/";
    const IMAGE_EXT = "jpg";

    const $flipbook = $("#flipbook");
    const bookArea = document.getElementById("bookArea");
    let loadedPages = 0;
    let bookReady = false;

    // ======================== 3D FLIPBOOK INIT ========================
    // Build all page divs with images
    for (let i = 1; i <= TOTAL_PAGES; i++) {
      const $page = $("<div class='page'></div>");
      const $img = $("<img>");
      $img.attr("src", `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`);
      $img.attr("crossorigin", "anonymous");
      $img.on("load", () => {
        loadedPages++;
        if (loadedPages === TOTAL_PAGES) initTurnBook();
      });
      $img.on("error", () => {
        $page.html(`<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white; background:#111827; font-size:20px;">⚠️ Missing ${i}</div>`);
        loadedPages++;
        if (loadedPages === TOTAL_PAGES) initTurnBook();
      });
      $page.append($img);
      $flipbook.append($page);
    }

    // Get optimal book size (A4 ratio, fills area)
    function getOptimalBookSize() {
      const topbar = document.querySelector(".topbar");
      const toolbarH = topbar ? topbar.offsetHeight : 64;
      const areaRect = bookArea.getBoundingClientRect();
      const maxWidth = areaRect.width * 0.96;
      const maxHeight = areaRect.height * 0.96;
      const ratio = 0.707; // A4 portrait
      let width = maxWidth;
      let height = width / ratio;
      if (height > maxHeight) {
        height = maxHeight;
        width = height * ratio;
      }
      return { width: Math.floor(width), height: Math.floor(height) };
    }

    // Play realistic page flip sound
    function playFlipSound() {
      const sound = document.getElementById("flipSound");
      if (!sound) return;
      sound.pause();
      sound.currentTime = 0;
      sound.volume = 0.7;
      sound.play().catch(e => console.log("audio play blocked, but flip works"));
    }

    // Initialize turn.js with 3D effects
    function initTurnBook() {
      if (bookReady) return;
      const { width, height } = getOptimalBookSize();
      $flipbook.turn({
        width: width,
        height: height,
        autoCenter: true,
        display: "single",
        acceleration: true,    // hardware 3D
        gradients: true,       // realistic shading
        elevation: 50,
        duration: 700,         // smooth page curl
        when: {
          turning: function(e, page, pageObject) {
            playFlipSound();    // sound on every page turn
          },
          turned: function(e, page) {
            updateCounter(page);
          }
        }
      });
      updateCounter(1);
      bookReady = true;

      // After book exists, attach gestures (swipe & pinch zoom)
      attachGestures();
      window.addEventListener("resize", () => {
        if ($flipbook.turn("is")) {
          setTimeout(() => {
            const newSize = getOptimalBookSize();
            $flipbook.turn("size", newSize.width, newSize.height);
          }, 100);
        }
      });
    }

    function updateCounter(page) {
      document.getElementById("pageCounter").innerText = `${page} / ${TOTAL_PAGES}`;
    }

    // ======================== HAND ZOOM (PINCH TO RESIZE BOOK – PRESERVES 3D) ========================
    // We implement pinch zoom by resizing the book dynamically.
    // This keeps the 3D perspective perfectly intact and feels natural.
    let currentBookWidth = 0, currentBookHeight = 0;
    let pinchStartDistance = 0;
    let pinchStartSize = { width: 0, height: 0 };
    let isPinching = false;

    function getPinchDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function resizeBookByScale(scaleFactor) {
      if (!bookReady) return;
      const currentSize = $flipbook.turn("size");
      let newWidth = currentSize.width * scaleFactor;
      let newHeight = currentSize.height * scaleFactor;
      const areaRect = bookArea.getBoundingClientRect();
      const maxWidth = areaRect.width * 0.98;
      const maxHeight = areaRect.height * 0.98;
      const minWidth = 240;
      const minHeight = 170;
      newWidth = Math.min(maxWidth, Math.max(minWidth, newWidth));
      newHeight = Math.min(maxHeight, Math.max(minHeight, newHeight));
      if (newWidth !== currentSize.width || newHeight !== currentSize.height) {
        $flipbook.turn("size", newWidth, newHeight);
        // Force re-center after resize
        $flipbook.turn("center");
      }
    }

    // ======================== SWIPE TO FLIP (when zoom is near default) ========================
    let touchStartX = 0, touchStartY = 0;
    let swipeActive = false;
    const SWIPE_THRESHOLD = 50;

    // combine touch handling: pinch to zoom, swipe to turn pages
    function attachGestures() {
      if (!bookArea) return;

      bookArea.addEventListener("touchstart", (e) => {
        if (!bookReady) return;
        const touches = e.touches;
        if (touches.length === 2) {
          // start pinch zoom
          isPinching = true;
          pinchStartDistance = getPinchDistance(touches);
          const currentSize = $flipbook.turn("size");
          pinchStartSize = { width: currentSize.width, height: currentSize.height };
          e.preventDefault();
        } 
        else if (touches.length === 1) {
          // prepare for swipe (only if book is not being pinched)
          touchStartX = touches[0].clientX;
          touchStartY = touches[0].clientY;
          swipeActive = true;
        }
      }, { passive: false });

      bookArea.addEventListener("touchmove", (e) => {
        if (!bookReady) return;
        const touches = e.touches;
        if (isPinching && touches.length === 2) {
          const currentDist = getPinchDistance(touches);
          if (pinchStartDistance > 0) {
            const scale = currentDist / pinchStartDistance;
            // apply scale to book size smoothly
            let newWidth = pinchStartSize.width * scale;
            let newHeight = pinchStartSize.height * scale;
            const areaRect = bookArea.getBoundingClientRect();
            const maxW = areaRect.width * 0.98;
            const maxH = areaRect.height * 0.98;
            newWidth = Math.min(maxW, Math.max(200, newWidth));
            newHeight = Math.min(maxH, Math.max(150, newHeight));
            if (newWidth > 0 && newHeight > 0) {
              $flipbook.turn("size", newWidth, newHeight);
              $flipbook.turn("center");
            }
          }
          e.preventDefault();
        } 
        else if (swipeActive && touches.length === 1 && !isPinching) {
          const deltaX = touches[0].clientX - touchStartX;
          const deltaY = touches[0].clientY - touchStartY;
          // only trigger swipe if horizontal movement dominates
          if (Math.abs(deltaX) > 20 && Math.abs(deltaX) > Math.abs(deltaY)) {
            swipeActive = false; // prevent multiple triggers
            if (deltaX > SWIPE_THRESHOLD) {
              $flipbook.turn("previous");
            } else if (deltaX < -SWIPE_THRESHOLD) {
              $flipbook.turn("next");
            }
            e.preventDefault();
          }
        }
      }, { passive: false });

      bookArea.addEventListener("touchend", (e) => {
        isPinching = false;
        swipeActive = false;
        pinchStartDistance = 0;
        touchStartX = 0;
        touchStartY = 0;
      });

      bookArea.addEventListener("touchcancel", (e) => {
        isPinching = false;
        swipeActive = false;
      });
    }

    // ======================== BUTTON CONTROLS ========================
    document.getElementById("prevBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("previous");
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (bookReady) $flipbook.turn("next");
    });
    document.getElementById("zoomIn").addEventListener("click", () => {
      if (!bookReady) return;
      const { width, height } = $flipbook.turn("size");
      const newWidth = width * 1.2;
      const newHeight = height * 1.2;
      const areaRect = bookArea.getBoundingClientRect();
      const maxW = areaRect.width * 0.98;
      const maxH = areaRect.height * 0.98;
      if (newWidth <= maxW && newHeight <= maxH) {
        $flipbook.turn("size", newWidth, newHeight);
        $flipbook.turn("center");
      } else {
        // set to max
        $flipbook.turn("size", maxW, maxH);
        $flipbook.turn("center");
      }
    });
    document.getElementById("zoomOut").addEventListener("click", () => {
      if (!bookReady) return;
      const { width, height } = $flipbook.turn("size");
      const newWidth = width * 0.8;
      const newHeight = height * 0.8;
      const minW = 200, minH = 150;
      if (newWidth >= minW && newHeight >= minH) {
        $flipbook.turn("size", newWidth, newHeight);
        $flipbook.turn("center");
      } else {
        $flipbook.turn("size", minW, minH);
        $flipbook.turn("center");
      }
    });

    // ======================== PDF EXPORT (reliable) ========================
    document.getElementById("downloadPDF").addEventListener("click", async function() {
      const btn = this;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = "📄 Preparing...";
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        async function loadImage(pageNumber) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error(`Missing page ${pageNumber}`));
            img.src = `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
          });
        }

        for (let i = 1; i <= TOTAL_PAGES; i++) {
          btn.innerHTML = `📄 ${i}/${TOTAL_PAGES}`;
          const img = await loadImage(i);
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const imgData = canvas.toDataURL("image/jpeg", 0.95);
          if (i > 1) pdf.addPage();
          pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
        }
        btn.innerHTML = "💾 Saving...";
        pdf.save("slock_catalog.pdf");
        btn.innerHTML = "✅ Done!";
        setTimeout(() => { btn.innerHTML = originalText; }, 1500);
      } catch (err) {
        console.error(err);
        alert("PDF error: " + err.message);
        btn.innerHTML = originalText;
      } finally {
        btn.disabled = false;
      }
    });

    // Keyboard arrows
    document.addEventListener("keydown", (e) => {
      if (!bookReady) return;
      if (e.key === "ArrowLeft") $flipbook.turn("previous");
      if (e.key === "ArrowRight") $flipbook.turn("next");
    });

    // Fallback: if some images never load (stuck), force init after 5s
    setTimeout(() => {
      if (!bookReady && loadedPages < TOTAL_PAGES) {
        console.warn("Forcing book init after timeout");
        initTurnBook();
      }
    }, 5000);
  })();
</script>
</body>
</html>
