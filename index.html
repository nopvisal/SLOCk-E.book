<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover
"/>

<title>SLOCK Catalog</title>

<!-- JQUERY -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- TURN JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<!-- PANZOOM -->
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
rel="stylesheet"
/>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#020617;

    font-family:'Inter',sans-serif;
}

/* =========================================
   BODY
========================================= */

body{

    background:
    radial-gradient(circle at top,
    #1e293b 0%,
    #0f172a 45%,
    #020617 100%);

    display:flex;

    flex-direction:column;
}

/* =========================================
   TOPBAR
========================================= */

.topbar{

    width:100%;

    min-height:64px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:12px 18px;

    background:rgba(15,23,42,.88);

    backdrop-filter:blur(18px);

    border-bottom:
    1px solid rgba(255,255,255,.08);

    z-index:9999;

    flex-wrap:wrap;

    gap:10px;
}

.brand{

    color:white;

    font-size:18px;

    font-weight:600;
}

.right-tools{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

/* =========================================
   BUTTONS
========================================= */

.control-btn{

    border:none;

    outline:none;

    height:40px;

    min-width:40px;

    padding:0 14px;

    border-radius:12px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    transition:.2s ease;
}

.control-btn:hover{

    background:#334155;
}

.control-btn:active{

    transform:scale(.96);
}

/* =========================================
   COUNTER
========================================= */

.page-indicator{

    color:#cbd5e1;

    font-size:14px;

    min-width:70px;

    text-align:center;
}

/* =========================================
   BOOK AREA
========================================= */

.book-area{

    flex:1;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

    padding:10px;
}

/* =========================================
   FLIPBOOK
========================================= */

#flipbook{

    box-shadow:
    0 25px 70px rgba(0,0,0,.55);
}

/* =========================================
   PAGE
========================================= */

.page{

    background:#111827;

    overflow:hidden;

    position:relative;
}

/* =========================================
   ZOOM WRAPPER
========================================= */

.zoom-wrapper{

    width:100%;
    height:100%;

    overflow:hidden;

    position:relative;

    background:#111827;

    touch-action:none;
}

/* =========================================
   PANZOOM TARGET
========================================= */

.panzoom-target{

    width:100%;
    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* =========================================
   IMAGE
========================================= */

.panzoom-target img{

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;

    -webkit-user-drag:none;

    pointer-events:none;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

    .topbar{

        padding:10px;
    }

    .brand{

        font-size:15px;
    }

    .control-btn{

        height:34px;

        min-width:34px;

        font-size:11px;
    }

    .page-indicator{

        min-width:50px;

        font-size:12px;
    }
}

</style>
</head>

<body>

<!-- =====================================
     TOPBAR
===================================== -->

<div class="topbar">

    <div class="brand">
        SLOCK Catalog
    </div>

    <div class="right-tools">

        <button class="control-btn" id="prevBtn">
            ◀
        </button>

        <div class="page-indicator" id="pageCounter">
            1 / 1
        </div>

        <button class="control-btn" id="nextBtn">
            ▶
        </button>

        <button class="control-btn" id="downloadPDF">
            PDF
        </button>

    </div>

</div>

<!-- =====================================
     BOOK AREA
===================================== -->

<div class="book-area">

    <div id="flipbook"></div>

</div>

<!-- =====================================
     FLIP SOUND
===================================== -->

<audio id="flipSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>

// ========================================
// CONFIG
// ========================================

const TOTAL_PAGES = 36;

const IMAGE_FOLDER = "images/";

const IMAGE_EXT = "jpg";

const flipbook =
    $("#flipbook");

let loadedPages = 0;

// ========================================
// CREATE PAGES
// ========================================

for(let i = 1; i <= TOTAL_PAGES; i++){

    const page =
        $("<div class='page'></div>");

    const wrapper =
        $("<div class='zoom-wrapper'></div>");

    const target =
        $("<div class='panzoom-target'></div>");

    const img =
        $("<img>");

    img.attr(
        "src",
        `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`
    );

    img.attr(
        "draggable",
        "false"
    );

    img.on("load",()=>{

        loadedPages++;

        if(
            loadedPages === TOTAL_PAGES
        ){

            initBook();
        }
    });

    img.on("error",()=>{

        target.html(`
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:22px;
            ">
                Missing Page ${i}
            </div>
        `);

        loadedPages++;

        if(
            loadedPages === TOTAL_PAGES
        ){

            initBook();
        }
    });

    target.append(img);

    wrapper.append(target);

    page.append(wrapper);

    flipbook.append(page);
}

// ========================================
// BOOK SIZE
// ========================================

function getBookSize(){

    const topbar =
        document.querySelector(".topbar");

    const toolbarHeight =
        topbar.offsetHeight;

    const screenWidth =
        window.innerWidth;

    const screenHeight =
        window.innerHeight - toolbarHeight;

    const ratio = 0.707;

    let width =
        screenWidth;

    let height =
        width / ratio;

    if(height > screenHeight){

        height = screenHeight;

        width = height * ratio;
    }

    width *= 0.98;

    height *= 0.98;

    return{

        width:Math.floor(width),

        height:Math.floor(height)
    };
}

// ========================================
// INIT BOOK
// ========================================

function initBook(){

    const size =
        getBookSize();

    flipbook.turn({

        width:size.width,

        height:size.height,

        autoCenter:true,

        display:"single",

        acceleration:true,

        gradients:true,

        elevation:60,

        duration:800,

        when:{

            turning:function(){

                playFlipSound();
            },

            turned:function(e,page){

                updateCounter(page);
            }
        }
    });

    updateCounter(1);

    enableZoom();
}

// ========================================
// COUNTER
// ========================================

function updateCounter(page){

    document.getElementById(
        "pageCounter"
    ).innerText =
    `${page} / ${TOTAL_PAGES}`;
}

// ========================================
// SOUND
// ========================================

function playFlipSound(){

    const sound =
        document.getElementById(
            "flipSound"
        );

    sound.pause();

    sound.currentTime = 0;

    sound.volume = 1;

    sound.play().catch(()=>{});
}

// ========================================
// BUTTONS
// ========================================

$("#prevBtn").click(()=>{

    flipbook.turn("previous");
});

$("#nextBtn").click(()=>{

    flipbook.turn("next");
});

// ========================================
// KEYBOARD
// ========================================

$(document).keydown(function(e){

    if(e.key === "ArrowLeft"){

        flipbook.turn("previous");
    }

    if(e.key === "ArrowRight"){

        flipbook.turn("next");
    }
});

// ========================================
// ENABLE ZOOM
// ========================================

function enableZoom(){
            "pointerup",

            function(e){

                panzoom.handleUp(e);
            }
        );

        // =============================
        // MOUSE WHEEL ZOOM
        // =============================

        wrapper.addEventListener(

            "wheel",

            function(e){

                e.preventDefault();

                panzoom.zoomWithWheel(e);

                zoomed = true;
            }
        );

        // =============================
        // DOUBLE TAP / DOUBLE CLICK
        // =============================

        let lastTap = 0;

        wrapper.addEventListener(

            "touchend",

            function(e){

                const currentTime = new Date().getTime();

                const tapLength =
                    currentTime - lastTap;

                if(
                    tapLength < 300 &&
                    tapLength > 0
                ){

                    const scale =
                        panzoom.getScale();

                    if(scale > 1){

                        panzoom.reset();

                        zoomed = false;

                    }else{

                        panzoom.zoom(2,{ animate:true });

                        zoomed = true;
                    }
                }

                lastTap = currentTime;
            }
        );
    });
}
// ========================================
// PDF DOWNLOAD
// ========================================

$("#downloadPDF").click(async function(){

    const btn = this;

    const originalText =
        btn.innerHTML;

    btn.disabled = true;

    btn.innerHTML = "Preparing...";

    try{

        const { jsPDF } =
            window.jspdf;

        const pdf = new jsPDF({

            orientation:"portrait",

            unit:"mm",

            format:"a4",

            compress:true
        });

        const pdfWidth =
            pdf.internal.pageSize.getWidth();

        const pdfHeight =
            pdf.internal.pageSize.getHeight();

        async function loadImage(pageNumber){

            return new Promise((resolve,reject)=>{

                const img = new Image();

                img.crossOrigin = "anonymous";

                img.onload =
                    ()=> resolve(img);

                img.onerror =
                    ()=> reject(
                        new Error(
                            `Missing Page ${pageNumber}`
                        )
                    );

                img.src =
                `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
            });
        }

        for(let i = 1; i <= TOTAL_PAGES; i++){

            btn.innerHTML =
            `${i}/${TOTAL_PAGES}`;

            const img =
                await loadImage(i);

            const canvas =
                document.createElement(
                    "canvas"
                );

            const ctx =
                canvas.getContext("2d");

            canvas.width =
                img.naturalWidth;

            canvas.height =
                img.naturalHeight;

            ctx.fillStyle =
                "#ffffff";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.drawImage(
                img,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const imgData =
                canvas.toDataURL(
                    "image/jpeg",
                    0.95
                );

            if(i > 1){

                pdf.addPage();
            }

            pdf.addImage(

                imgData,

                "JPEG",

                0,

                0,

                pdfWidth,

                pdfHeight
            );
        }

        btn.innerHTML =
            "Saving...";

        pdf.save(
            "SLOCK-Catalog.pdf"
        );

        btn.innerHTML =
            "Done ✓";

        setTimeout(()=>{

            btn.innerHTML =
                originalText;

        },1500);

    }catch(err){

        console.error(err);

        alert(err.message);

        btn.innerHTML =
            originalText;

    }finally{

        btn.disabled = false;
    }
});

// ========================================
// RESIZE
// ========================================

window.addEventListener(

    "resize",

    ()=>{

        if(!flipbook.turn("is"))
        return;

        setTimeout(()=>{

            const size =
                getBookSize();

            flipbook.turn(

                "size",

                size.width,

                size.height
            );

        },100);
    }
);

</script>

</body>
</html>
