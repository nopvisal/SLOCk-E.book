<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      position: fixed;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      padding-top: max(env(safe-area-inset-top), 12px);
      padding-bottom: max(env(safe-area-inset-bottom), 12px);
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      min-height: 64px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 99999;
      position: relative;
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .page-indicator {
      color: #cbd5e1;
      font-size: 14px;
      min-width: 70px;
      text-align: center;
      font-weight: 500;
    }

    .control-btn {
      border: none;
      outline: none;
      height: 40px;
      min-width: 40px;
      padding: 0 14px;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .control-btn:active {
      transform: scale(0.96);
    }

    .book-area {
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      position: relative;
      background: #020617;
    }

    /* Zoom container for pinch + pan */
    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
      will-change: transform;
      cursor: grab;
    }
    .zoom-container:active {
      cursor: grabbing;
    }

    #flipbook {
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      transition: box-shadow 0.2s;
    }

    /* 3D pages are handled by turn.js automatically */
    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
      background: #111827;
    }

    @media (max-width: 768px) {
      .topbar {
        min-height: 58px;
        padding: 10px;
      }
      .brand { font-size: 15px; }
      .control-btn { height: 34px; min-width: 34px; font-size: 11px; padding: 0 10px; }
      .page-indicator { font-size: 12px; min-width: 50px; }
    }

    .zoom-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 11px;
      color: #e2e8f0;
      pointer-events: none;
      z-index: 10;
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left-tools">
      <div class="brand">SLOCK Catalog</div>
    </div>
    <div class="right-tools">
      <button class="control-btn" id="prevBtn"> ◀ </button>
      <div class="page-indicator" id="pageCounter">1 / 36</div>
      <button class="control-btn" id="nextBtn"> ▶ </button>
      <button class="control-btn" id="zoomOut"> − </button>
      <button class="control-btn" id="zoomIn"> + </button>
      <button class="control-btn" id="downloadPDF"> PDF </button>
    </div>
  </div>
  <div class="book-area">
    <div id="zoomContainer" class="zoom-container">
      <div id="flipbook"></div>
    </div>
    <div class="zoom-hint">✌️ Pinch to zoom · Drag to pan · Swipe to flip</div>
  </div>
</div>

<!-- Realistic book swipe sound (high quality flip) -->
<audio id="flipSound" preload="auto">
  <source src="https://www.soundjay.com/misc/sounds/book-page-turn-3.mp3" type="audio/mpeg">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>
  // ======================== CONFIGURATION ========================
  const TOTAL_PAGES = 36;
  const IMAGE_FOLDER = "images/";
  const IMAGE_EXT = "jpg";

  const flipbook = $("#flipbook");
  const zoomContainer = document.getElementById("zoomContainer");
  let loadedPages = 0;
  let bookReady = false;

  // ======================== ZOOM & PAN STATE ========================
  let currentZoom = 1.0;
  let panX = 0, panY = 0;
  const MIN_ZOOM = 0.6;
  const MAX_ZOOM = 4.0;

  // Gesture state
  let activeTouches = [];
  let initialPinchDistance = 0;
  let initialZoom = 1;
  let isPinching = false;
  let isPanning = false;
  let lastTouchX = 0, lastTouchY = 0;
  let lastPanX = 0, lastPanY = 0;
  let lastTouchTime = 0;
  let lastTapPos = null;

  // Swipe-to-turn (when zoom near 1)
  let touchStartX = 0, touchStartY = 0;
  let touchMovedForSwipe = false;

  // ======================== BUILD PAGES ========================
  for (let i = 1; i <= TOTAL_PAGES; i++) {
    const page = $("<div class='page'></div>");
    const img = $("<img>");
    img.attr("src", `${IMAGE_FOLDER}page${i}.${IMAGE_EXT}`);
    img.attr("crossorigin", "anonymous");
    img.on("load", () => {
      loadedPages++;
      if (loadedPages === TOTAL_PAGES) initBook();
    });
    img.on("error", () => {
      page.html(`<div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:white; font-size:22px; background:#111827;"> ⚠️ Missing ${i} </div>`);
      loadedPages++;
      if (loadedPages === TOTAL_PAGES) initBook();
    });
    page.append(img);
    flipbook.append(page);
  }

  // ======================== BOOK SIZE (A4 ratio) ========================
  function getBookSize() {
    const topbar = document.querySelector(".topbar");
    const toolbarHeight = topbar.offsetHeight;
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight - toolbarHeight;
    const ratio = 0.707; // A4 portrait aspect
    let width = screenWidth;
    let height = width / ratio;
    if (height > screenHeight) {
      height = screenHeight;
      width = height * ratio;
    }
    width *= 0.99;
    height *= 0.99;
    return { width: Math.floor(width), height: Math.floor(height) };
  }

  // ======================== APPLY ZOOM & PAN ========================
  function applyZoomPanTransform() {
    if (!zoomContainer) return;
    currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, currentZoom));
    // Clamp pan when zoomed to avoid empty borders
    const containerRect = zoomContainer.parentElement?.getBoundingClientRect();
    const flipEl = document.getElementById("flipbook");
    if (flipEl && containerRect && currentZoom > 1.0) {
      const flipRect = flipEl.getBoundingClientRect();
      const scaledWidth = flipRect.width * currentZoom;
      const scaledHeight = flipRect.height * currentZoom;
      const maxPanX = Math.max(0, (scaledWidth - containerRect.width) / 2);
      const maxPanY = Math.max(0, (scaledHeight - containerRect.height) / 2);
      panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
      panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
    } else if (currentZoom <= 1.05) {
      panX = 0;
      panY = 0;
    }
    zoomContainer.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${currentZoom})`;
  }

  function resetZoomAndPan() {
    currentZoom = 1.0;
    panX = 0;
    panY = 0;
    applyZoomPanTransform();
  }

  function modifyZoom(delta) {
    let newZoom = currentZoom + delta;
    newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
    if (newZoom === currentZoom) return;
    currentZoom = newZoom;
    if (currentZoom <= 1.05) {
      panX = 0;
      panY = 0;
    }
    applyZoomPanTransform();
  }

  // ======================== REALISTIC SOUND ========================
  function playFlipSound() {
    const sound = document.getElementById("flipSound");
    if (!sound) return;
    sound.pause();
    sound.currentTime = 0;
    sound.volume = 0.75;
    sound.play().catch(e => console.log("Audio play failed:", e));
  }

  // ======================== FLIPBOOK INIT (3D EFFECT) ========================
  function initBook() {
    const size = getBookSize();
    flipbook.turn({
      width: size.width,
      height: size.height,
      autoCenter: true,
      display: "single",
      acceleration: true,    // enables 3D hardware acceleration
      gradients: true,      // smooth shading for 3D flip
      elevation: 50,
      duration: 700,        // smooth, realistic page turn
      when: {
        turning: function(e, page, pageObject) {
          playFlipSound();   // realistic swipe sound on every turn
        },
        turned: function(e, page) {
          updateCounter(page);
          // after flip, ensure zoom container adapts
          setTimeout(() => applyZoomPanTransform(), 30);
        }
      }
    });
    updateCounter(1);
    bookReady = true;
    // after book is ready, attach gesture system
    attachGestures();
    window.addEventListener("resize", () => setTimeout(handleResize, 100));
    resetZoomAndPan();
  }

  function updateCounter(page) {
    document.getElementById("pageCounter").innerText = `${page} / ${TOTAL_PAGES}`;
  }

  function handleResize() {
    if (!flipbook.turn("is")) return;
    const size = getBookSize();
    flipbook.turn("size", size.width, size.height);
    resetZoomAndPan();
  }

  // ======================== GESTURE ENGINE (PINCH + PAN + SWIPE) ========================
  function getTouchDistance(touches) {
    if (touches.length < 2) return 0;
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  function getTouchCenter(touches) {
    if (touches.length === 1) return { x: touches[0].clientX, y: touches[0].clientY };
    if (touches.length >= 2) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }
    return { x: 0, y: 0 };
  }

  function onTouchStart(e) {
    if (!bookReady) return;
    e.preventDefault();
    const touches = Array.from(e.touches);
    activeTouches = touches;

    // Prepare for swipe (only when zoom is near 1)
    if (touches.length === 1 && currentZoom <= 1.08) {
      touchStartX = touches[0].clientX;
      touchStartY = touches[0].clientY;
      touchMovedForSwipe = false;
    } else {
      touchStartX = 0;
      touchStartY = 0;
    }

    if (touches.length === 2) {
      isPinching = true;
      initialPinchDistance = getTouchDistance(touches);
      initialZoom = currentZoom;
      // store center for smooth zoom
      const center = getTouchCenter(touches);
      lastPanX = panX;
      lastPanY = panY;
    } else if (touches.length === 1 && currentZoom > 1.05) {
      isPanning = true;
      lastTouchX = touches[0].clientX;
      lastTouchY = touches[0].clientY;
      lastPanX = panX;
      lastPanY = panY;
    } else {
      isPanning = false;
    }
  }

  function onTouchMove(e) {
    if (!bookReady) return;
    e.preventDefault();
    const touches = Array.from(e.touches);
    activeTouches = touches;

    // PINCH ZOOM
    if (touches.length === 2 && isPinching) {
      const newDistance = getTouchDistance(touches);
      if (initialPinchDistance > 0) {
        let scaleFactor = newDistance / initialPinchDistance;
        let newZoom = initialZoom * scaleFactor;
        newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
        if (newZoom !== currentZoom) {
          const center = getTouchCenter(touches);
          const containerRect = zoomContainer.parentElement.getBoundingClientRect();
          const flipEl = document.getElementById("flipbook");
          const flipRect = flipEl?.getBoundingClientRect();
          if (flipRect && containerRect) {
            const relX = (center.x - containerRect.left) / containerRect.width;
            const relY = (center.y - containerRect.top) / containerRect.height;
            const prevZoom = currentZoom;
            currentZoom = newZoom;
            if (prevZoom !== 0) {
              panX = (panX + (relX * containerRect.width) * (1 - newZoom/prevZoom));
              panY = (panY + (relY * containerRect.height) * (1 - newZoom/prevZoom));
            }
          } else {
            currentZoom = newZoom;
          }
          applyZoomPanTransform();
        }
      }
    }
    // PAN (single finger, zoomed)
    else if (touches.length === 1 && currentZoom > 1.05 && !isPinching) {
      if (!isPanning) {
        isPanning = true;
        lastTouchX = touches[0].clientX;
        lastTouchY = touches[0].clientY;
        lastPanX = panX;
        lastPanY = panY;
        return;
      }
      const dx = touches[0].clientX - lastTouchX;
      const dy = touches[0].clientY - lastTouchY;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        panX = lastPanX + dx;
        panY = lastPanY + dy;
        applyZoomPanTransform();
      }
    }
    // Detect swipe movement for page flip (only when zoom low)
    else if (touches.length === 1 && currentZoom <= 1.08 && !isPinching && touchStartX !== 0) {
      const deltaX = touches[0].clientX - touchStartX;
      const deltaY = touches[0].clientY - touchStartY;
      if (Math.abs(deltaX) > 15 || Math.abs(deltaY) > 15) {
        touchMovedForSwipe = true;
      }
    }
  }

  function onTouchEnd(e) {
    if (!bookReady) return;
    e.preventDefault();
    const wasPinching = isPinching;

    // HANDLE SWIPE TO TURN PAGE (realistic 3D flip)
    if (!wasPinching && currentZoom <= 1.08 && touchStartX !== 0 && touchMovedForSwipe) {
      const changed = e.changedTouches[0];
      if (changed) {
        const deltaX = changed.clientX - touchStartX;
        if (Math.abs(deltaX) > 50) {
          if (deltaX < 0) {
            flipbook.turn("next");
          } else {
            flipbook.turn("previous");
          }
          // play sound is already triggered by 'turning' event, but we ensure no double
        }
      }
      touchMovedForSwipe = false;
    }

    // Double tap reset (zoom + pan)
    if (e.touches.length === 0 && !wasPinching) {
      const now = Date.now();
      if (now - lastTouchTime < 280 && lastTapPos) {
        resetZoomAndPan();
        lastTouchTime = 0;
        lastTapPos = null;
      } else {
        lastTouchTime = now;
        if (e.changedTouches[0]) {
          lastTapPos = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        }
      }
    }

    // reset gesture flags
    isPinching = false;
    isPanning = false;
    activeTouches = [];
    initialPinchDistance = 0;
    touchStartX = 0;
    touchStartY = 0;
    applyZoomPanTransform();
  }

  function attachGestures() {
    if (!zoomContainer) return;
    zoomContainer.addEventListener("touchstart", onTouchStart, { passive: false });
    zoomContainer.addEventListener("touchmove", onTouchMove, { passive: false });
    zoomContainer.addEventListener("touchend", onTouchEnd);
    zoomContainer.addEventListener("touchcancel", onTouchEnd);
    zoomContainer.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  // ======================== BUTTON CONTROLS ========================
  $("#prevBtn").click(() => { if (bookReady) flipbook.turn("previous"); });
  $("#nextBtn").click(() => { if (bookReady) flipbook.turn("next"); });
  $("#zoomIn").click(() => modifyZoom(0.2));
  $("#zoomOut").click(() => modifyZoom(-0.2));

  // ======================== PDF EXPORT (unchanged, robust) ========================
  $("#downloadPDF").click(async function () {
    const btn = this;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = "📄 Preparing...";
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();

      async function loadImage(pageNumber) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error(`Missing page ${pageNumber}`));
          img.src = `${IMAGE_FOLDER}page${pageNumber}.${IMAGE_EXT}`;
        });
      }

      for (let i = 1; i <= TOTAL_PAGES; i++) {
        btn.innerHTML = `📄 ${i}/${TOTAL_PAGES}`;
        const img = await loadImage(i);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = canvas.toDataURL("image/jpeg", 0.95);
        if (i > 1) pdf.addPage();
        pdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
      }
      btn.innerHTML = "💾 Saving...";
      pdf.save("slock_catalog.pdf");
      btn.innerHTML = "✅ Done!";
      setTimeout(() => { btn.innerHTML = originalText; }, 1500);
    } catch (err) {
      console.error(err);
      alert("PDF error: " + err.message);
      btn.innerHTML = originalText;
    } finally {
      btn.disabled = false;
    }
  });

  // ======================== KEYBOARD SUPPORT ========================
  $(document).keydown((e) => {
    if (!bookReady) return;
    if (e.key === "ArrowLeft") flipbook.turn("previous");
    if (e.key === "ArrowRight") flipbook.turn("next");
  });

  // Wait for pages to load before allowing interactions
  function waitForPagesAndEnable() {
    if (loadedPages === TOTAL_PAGES && !bookReady) {
      // book will be initialized inside initBook called from last image load.
    } else if (loadedPages === TOTAL_PAGES && bookReady) {
      // already ready
      return;
    } else {
      setTimeout(waitForPagesAndEnable, 60);
    }
  }
  waitForPagesAndEnable();

  // extra: ensure sound loads and is ready
  window.addEventListener("load", () => {
    const sound = document.getElementById("flipSound");
    if (sound) sound.load();
  });
</script>
</body>
</html>
