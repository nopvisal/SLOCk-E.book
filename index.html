<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SLOCK Catalog | Digital Flipbook</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      font-family: 'Inter', sans-serif;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      min-height: 70px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 99999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .left-tools, .right-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .pdf-status {
      background: rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.5);
      border-radius: 40px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #38bdf8;
    }

    .page-indicator {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      min-width: 85px;
      text-align: center;
    }

    .control-btn {
      border: none;
      outline: none;
      height: 42px;
      min-width: 42px;
      padding: 0 18px;
      border-radius: 30px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(4px);
      color: #f1f5f9;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .control-btn:hover:not(:disabled) {
      background: #334155;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }
    .control-btn:active:not(:disabled) { transform: scale(0.96); background: #1e293b; }
    .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 680px) {
      .topbar { padding: 10px 16px; gap: 10px; min-height: 60px; }
      .left-tools, .right-tools { gap: 8px; }
      .brand { font-size: 1rem; }
      .control-btn { height: 36px; min-width: 36px; padding: 0 12px; font-size: 0.75rem; }
      .page-indicator { padding: 4px 10px; font-size: 0.75rem; min-width: 70px; }
      .pdf-status { font-size: 0.65rem; padding: 4px 10px; }
    }

    .book-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #020617;
      touch-action: none;
    }
    .zoom-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      will-change: transform;
      transform-origin: center center;
    }
    #flipbook { box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); }
    .page {
      background: #111827;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .page canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111827;
    }
    .zoom-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #cbd5e6;
      pointer-events: none;
      z-index: 20;
    }

    .torx-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0f172a, #020617);
      z-index: 100000;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      transition: opacity 0.4s ease;
      flex-direction: column;
    }
    .torx {
      width: 80px;
      height: 80px;
      position: relative;
      animation: spin 1.2s linear infinite;
    }
    .torx svg { width: 100%; height: 100%; filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.5)); }
    .torx .path {
      stroke: #38bdf8;
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 240;
      animation: dash 1.5s ease-in-out infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes dash { 0% { stroke-dashoffset: 240; } 50% { stroke-dashoffset: 80; } 100% { stroke-dashoffset: 240; } }
    .loader-text { margin-top: 20px; color: #94a3b8; font-size: 0.9rem; font-weight: 500; text-align: center; }
    .progress-bar {
      width: 280px;
      height: 4px;
      background: #1e293b;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #38bdf8;
      transition: width 0.2s ease;
    }
    @media (max-width: 768px) { .torx { width: 60px; height: 60px; } .loader-text { font-size: 0.75rem; } }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left-tools">
      <div class="brand">📖 SLOCK</div>
      <div class="pdf-status" id="pdfStatus">Auto-Loading...</div>
    </div>
    <div class="right-tools">
      <button class="control-btn" id="prevBtn" disabled>◀ Prev</button>
      <div class="page-indicator" id="pageCounter">— / —</div>
      <button class="control-btn" id="nextBtn" disabled>Next ▶</button>
      <button class="control-btn" id="zoomOutBtn" disabled>− Zoom</button>
      <button class="control-btn" id="zoomInBtn" disabled>Zoom +</button>
      <button class="control-btn" id="downloadPDFBtn" disabled>📥 Download PDF</button>
    </div>
  </div>
  <div class="book-area" id="bookArea">
    <div class="zoom-container" id="zoomContainer">
      <div id="flipbook"></div>
    </div>
    <div class="zoom-hint">👆 Swipe to flip pages · ✨ Pinch to zoom · Double-tap to reset</div>
  </div>
</div>

<div id="torxLoader" class="torx-loader">
  <div class="torx">
    <svg viewBox="0 0 100 100">
      <path class="path" d="M50 10 L62 25 L50 40 L38 25 Z M50 60 L62 75 L50 90 L38 75 Z M10 35 L25 47 L10 59 L25 71 M90 35 L75 47 L90 59 L75 71" stroke="#38bdf8" stroke-width="2.5" fill="none"/>
      <circle cx="50" cy="50" r="8" stroke="#38bdf8" stroke-width="2" fill="none"/>
    </svg>
  </div>
  <div class="loader-text" id="loaderMsg">Loading SLOCK Catalog...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<audio id="flipSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-flip-47177.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // Initialize PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    let pdfDocument = null;
    let totalPages = 0;
    let pageImages = [];
    let flipbookReady = false;
    let flipbookInitialized = false;
    
    // DOM Elements
    const $flipbook = $("#flipbook");
    const bookArea = document.getElementById("bookArea");
    const zoomContainer = document.getElementById("zoomContainer");
    const loader = document.getElementById("torxLoader");
    const progressFill = document.getElementById("progressFill");
    const loaderMsg = document.getElementById("loaderMsg");
    const pdfStatus = document.getElementById("pdfStatus");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const downloadBtn = document.getElementById("downloadPDFBtn");
    const pageCounter = document.getElementById("pageCounter");
    
    // Audio
    const flipSound = document.getElementById("flipSound");
    let audioEnabled = false;
    
    function enableAudio() {
      if (audioEnabled) return;
      if (flipSound) {
        flipSound.play().then(() => {
          flipSound.pause();
          flipSound.currentTime = 0;
          audioEnabled = true;
        }).catch(() => {});
      }
      audioEnabled = true;
    }
    
    document.body.addEventListener("touchstart", enableAudio, { once: true });
    document.body.addEventListener("click", enableAudio, { once: true });
    
    function playFlip() {
      if (!flipSound || !audioEnabled) return;
      flipSound.pause();
      flipSound.currentTime = 0;
      flipSound.volume = 0.5;
      flipSound.play().catch(() => {});
    }
    
    // UI Helpers
    function setControlsEnabled(enabled) {
      prevBtn.disabled = !enabled;
      nextBtn.disabled = !enabled;
      zoomOutBtn.disabled = !enabled;
      zoomInBtn.disabled = !enabled;
      downloadBtn.disabled = !enabled;
    }
    
    function showLoader(show, text = "Processing...") {
      if (show) {
        loaderMsg.innerText = text;
        loader.style.display = "flex";
        loader.style.opacity = "1";
      } else {
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 400);
      }
    }
    
    function updateProgress(percent, message) {
      if (progressFill) progressFill.style.width = percent + "%";
      if (message) loaderMsg.innerText = message;
    }
    
    function getBookSize() {
      const rect = bookArea.getBoundingClientRect();
      let maxW = rect.width * 0.92;
      let maxH = rect.height * 0.92;
      const ratio = 0.707; // A4 portrait ratio
      let width = maxW;
      let height = width / ratio;
      if (height > maxH) {
        height = maxH;
        width = height * ratio;
      }
      return { width: Math.floor(width), height: Math.floor(height) };
    }
    
    function updatePageCounter(page) {
      if (totalPages > 0) {
        pageCounter.innerText = `${page} / ${totalPages}`;
      }
    }
    
    // Destroy existing flipbook
    function destroyFlipbook() {
      if (flipbookInitialized && $flipbook.turn("is")) {
        try { $flipbook.turn("destroy"); } catch(e) {}
      }
      $flipbook.empty();
      flipbookInitialized = false;
      flipbookReady = false;
      setControlsEnabled(false);
    }
    
    // Initialize flipbook with rendered pages
    function initFlipbook() {
      if (flipbookInitialized) {
        try { $flipbook.turn("destroy"); } catch(e) {}
        $flipbook.empty();
      }
      
      // Add all pages as canvas elements
      for (let i = 0; i < pageImages.length; i++) {
        const $page = $("<div class='page'></div>");
        if (pageImages[i]) {
          $page.append(pageImages[i]);
        } else {
          $page.html(`<div style="color:white; padding:20px;">Error loading page ${i+1}</div>`);
        }
        $flipbook.append($page);
      }
      
      const { width, height } = getBookSize();
      $flipbook.turn({
        width: width,
        height: height,
        autoCenter: true,
        display: "single",
        acceleration: true,
        gradients: true,
        elevation: 50,
        duration: 500,
        when: {
          turning: () => playFlip(),
          turned: (e, page) => updatePageCounter(page)
        }
      });
      
      flipbookInitialized = true;
      flipbookReady = true;
      updatePageCounter(1);
      resetZoomPan();
      setControlsEnabled(true);
      pdfStatus.innerHTML = `✅ ${totalPages} pages ready`;
      pdfStatus.style.borderColor = "#10b981";
      pdfStatus.style.color = "#10b981";
      
      // Handle window resize
      $(window).off('resize.flipbook').on('resize.flipbook', () => {
        if ($flipbook.turn("is")) {
          setTimeout(() => {
            const newSize = getBookSize();
            $flipbook.turn("size", newSize.width, newSize.height);
            resetZoomPan();
          }, 100);
        }
      });
    }
    
    // Extract and render PDF pages to canvases
    async function extractPDFToImages(pdfArrayBuffer) {
      try {
        const loadingTask = pdfjsLib.getDocument({ data: pdfArrayBuffer, useSystemFonts: true });
        const pdf = await loadingTask.promise;
        pdfDocument = pdf;
        totalPages = pdf.numPages;
        
        updateProgress(10, `Found ${totalPages} pages. Rendering...`);
        
        const canvases = [];
        const scale = 2.0; // Good quality for flipbook
        
        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          const percent = 10 + Math.floor((pageNum / totalPages) * 85);
          updateProgress(percent, `Rendering page ${pageNum}/${totalPages}...`);
          
          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          canvas.style.objectFit = 'contain';
          
          await page.render({
            canvasContext: context,
            viewport: viewport,
            background: '#111827'
          }).promise;
          
          canvases.push(canvas);
          
          // Small delay for responsiveness
          await new Promise(r => setTimeout(r, 10));
        }
        
        pageImages = canvases;
        updateProgress(100, "Complete! Loading flipbook...");
        
        setTimeout(() => {
          showLoader(false);
          initFlipbook();
        }, 300);
        
      } catch (error) {
        console.error("PDF extraction error:", error);
        showLoader(false);
        pdfStatus.innerHTML = "❌ Failed to load PDF";
        pdfStatus.style.borderColor = "#ef4444";
        pdfStatus.style.color = "#ef4444";
        $flipbook.html(`<div style="color:#94a3b8; text-align:center; padding:60px;">
          <div style="font-size:3rem; margin-bottom:20px;">📄</div>
          <div style="font-size:1rem; margin-bottom:10px;">Could not load "Slock Catalog.pdf"</div>
          <div style="font-size:0.85rem;">Make sure the file exists in the same folder as this HTML file</div>
        </div>`);
      }
    }
    
    // Load PDF from local folder
    async function loadLocalPDF() {
      showLoader(true, "Looking for SLOCK Catalog...");
      updateProgress(5, "Searching for PDF file");
      
      // Try different filename variations
      const fileNames = [
        "Slock Catalog.pdf",
        "Slock_Catalog.pdf",
        "SLOCK Catalog.pdf",
        "slock-catalog.pdf",
        "SlockCatalog.pdf",
        "SLOCK.pdf"
      ];
      
      let pdfData = null;
      let foundFile = "";
      
      for (const name of fileNames) {
        try {
          updateProgress(8, `Checking: ${name}`);
          const response = await fetch(name);
          if (response.ok) {
            pdfData = await response.arrayBuffer();
            foundFile = name;
            break;
          }
        } catch (err) {
          continue;
        }
      }
      
      if (!pdfData) {
        showLoader(false);
        pdfStatus.innerHTML = "⚠️ PDF not found";
        pdfStatus.style.borderColor = "#f59e0b";
        pdfStatus.style.color = "#f59e0b";
        $flipbook.html(`<div style="color:#94a3b8; text-align:center; padding:60px;">
          <div style="font-size:3rem; margin-bottom:20px;">📕</div>
          <div style="font-size:1.1rem; margin-bottom:10px;">Slock Catalog.pdf not found</div>
          <div style="font-size:0.85rem;">Please place "Slock Catalog.pdf" in the same folder</div>
          <div style="font-size:0.75rem; margin-top:15px;">Supported names: Slock Catalog.pdf, Slock_Catalog.pdf, SLOCK.pdf</div>
        </div>`);
        return;
      }
      
      updateProgress(10, `Found ${foundFile}, extracting pages...`);
      pdfStatus.innerHTML = `📄 Extracting from ${foundFile}`;
      await extractPDFToImages(pdfData);
    }
    
    // Zoom & Pan functionality
    let currentZoom = 1, currentPanX = 0, currentPanY = 0;
    let initialZoom = 1, initialPanX = 0, initialPanY = 0;
    let pinchStart = 0;
    let isPinching = false, isPanning = false;
    let lastTouchX = 0, lastTouchY = 0, lastPanX = 0, lastPanY = 0;
    let lastTap = 0, lastTapX = 0, lastTapY = 0, tapTimer = null;
    let swipeStart = 0, swipeActive = false;
    
    function applyTransform() {
      zoomContainer.style.transform = `translate3d(${currentPanX}px, ${currentPanY}px, 0) scale(${currentZoom})`;
      if (currentZoom > 1.02) {
        $flipbook.css("pointer-events", "none");
      } else {
        $flipbook.css("pointer-events", "auto");
        if (currentPanX !== 0 || currentPanY !== 0) {
          currentPanX = 0;
          currentPanY = 0;
          zoomContainer.style.transform = `translate3d(0px, 0px, 0) scale(1)`;
        }
      }
    }
    
    function resetZoomPan() {
      currentZoom = 1;
      currentPanX = 0;
      currentPanY = 0;
      applyTransform();
    }
    
    function getDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }
    
    // Touch events
    bookArea.addEventListener("touchstart", (e) => {
      const touches = e.touches;
      
      if (touches.length === 1 && !isPinching && !isPanning && flipbookReady) {
        const now = Date.now();
        const tx = touches[0].clientX;
        const ty = touches[0].clientY;
        if (now - lastTap < 300 && Math.hypot(tx - lastTapX, ty - lastTapY) < 40) {
          resetZoomPan();
          e.preventDefault();
          if (tapTimer) clearTimeout(tapTimer);
          lastTap = 0;
          return;
        } else {
          lastTap = now;
          lastTapX = tx;
          lastTapY = ty;
          if (tapTimer) clearTimeout(tapTimer);
          tapTimer = setTimeout(() => { lastTap = 0; }, 300);
        }
      }
      
      if (touches.length === 2 && flipbookReady) {
        isPinching = true;
        pinchStart = getDistance(touches);
        initialZoom = currentZoom;
        initialPanX = currentPanX;
        initialPanY = currentPanY;
        e.preventDefault();
      } else if (touches.length === 1 && flipbookReady) {
        if (currentZoom > 1.02) {
          isPanning = true;
          lastTouchX = touches[0].clientX;
          lastTouchY = touches[0].clientY;
          lastPanX = currentPanX;
          lastPanY = currentPanY;
          e.preventDefault();
        } else {
          swipeStart = touches[0].clientX;
          swipeActive = true;
        }
      }
    });
    
    bookArea.addEventListener("touchmove", (e) => {
      const touches = e.touches;
      if (isPinching && touches.length === 2 && flipbookReady) {
        const newDist = getDistance(touches);
        if (pinchStart > 0) {
          let scale = newDist / pinchStart;
          let newZoom = initialZoom * scale;
          newZoom = Math.min(4.0, Math.max(1.0, newZoom));
          if (newZoom !== currentZoom) {
            currentZoom = newZoom;
            currentPanX = initialPanX;
            currentPanY = initialPanY;
            applyTransform();
          }
        }
        e.preventDefault();
      } else if (isPanning && touches.length === 1 && flipbookReady) {
        const dx = touches[0].clientX - lastTouchX;
        const dy = touches[0].clientY - lastTouchY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
          currentPanX = lastPanX + dx;
          currentPanY = lastPanY + dy;
          const containerRect = bookArea.getBoundingClientRect();
          const flipEl = document.getElementById("flipbook");
          if (flipEl) {
            const flipRect = flipEl.getBoundingClientRect();
            const scaledW = flipRect.width * currentZoom;
            const scaledH = flipRect.height * currentZoom;
            const maxPanX = Math.max(0, (scaledW - containerRect.width) / 2);
            const maxPanY = Math.max(0, (scaledH - containerRect.height) / 2);
            currentPanX = Math.min(maxPanX, Math.max(-maxPanX, currentPanX));
            currentPanY = Math.min(maxPanY, Math.max(-maxPanY, currentPanY));
          }
          applyTransform();
        }
        e.preventDefault();
      } else if (swipeActive && touches.length === 1 && flipbookReady && currentZoom <= 1.02) {
        const deltaX = touches[0].clientX - swipeStart;
        if (Math.abs(deltaX) > 20) e.preventDefault();
      }
    });
    
    bookArea.addEventListener("touchend", (e) => {
      if (swipeActive && flipbookReady && currentZoom <= 1.02 && !isPinching && !isPanning) {
        const changed = e.changedTouches[0];
        if (changed && swipeStart !== 0) {
          const deltaX = changed.clientX - swipeStart;
          if (Math.abs(deltaX) > 50) {
            if (deltaX > 0) $flipbook.turn("previous");
            else $flipbook.turn("next");
          }
        }
      }
      isPinching = false;
      isPanning = false;
      swipeActive = false;
      pinchStart = 0;
    });
    
    // Button event listeners
    zoomInBtn.addEventListener("click", () => {
      if (flipbookReady) {
        currentZoom = Math.min(4.0, currentZoom + 0.2);
        if (currentZoom <= 1.02) { currentPanX = 0; currentPanY = 0; }
        applyTransform();
      }
    });
    
    zoomOutBtn.addEventListener("click", () => {
      if (flipbookReady) {
        currentZoom = Math.max(1.0, currentZoom - 0.2);
        if (currentZoom <= 1.02) { currentPanX = 0; currentPanY = 0; }
        applyTransform();
      }
    });
    
    prevBtn.addEventListener("click", () => { if (flipbookReady) $flipbook.turn("previous"); });
    nextBtn.addEventListener("click", () => { if (flipbookReady) $flipbook.turn("next"); });
    
    // Download original PDF directly (fast, no re-rendering)
    downloadBtn.addEventListener("click", async () => {
      if (!pdfDocument) {
        alert("No PDF loaded yet. Please wait for the catalog to load.");
        return;
      }
      
      const btn = downloadBtn;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = "📥 Downloading...";
      
      try {
        // Fetch the original PDF file again for download
        const fileNames = ["Slock Catalog.pdf", "Slock_Catalog.pdf", "SLOCK Catalog.pdf", "slock-catalog.pdf"];
        let pdfBlob = null;
        
        for (const name of fileNames) {
          try {
            const response = await fetch(name);
            if (response.ok) {
              pdfBlob = await response.blob();
              break;
            }
          } catch (err) { continue; }
        }
        
        if (pdfBlob) {
          const url = URL.createObjectURL(pdfBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'Slock_Catalog.pdf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btn.innerHTML = "✅ Downloaded!";
        } else {
          // Fallback: generate PDF from rendered canvases
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4", compress: true });
          const pdfW = pdf.internal.pageSize.getWidth();
          const pdfH = pdf.internal.pageSize.getHeight();
          
          for (let i = 0; i < pageImages.length; i++) {
            btn.innerHTML = `📥 ${i+1}/${pageImages.length}`;
            const canvas = pageImages[i];
            if (canvas) {
              const imgData = canvas.toDataURL("image/jpeg", 0.92);
              if (i > 0) pdf.addPage();
              pdf.addImage(imgData, "JPEG", 0, 0, pdfW, pdfH);
            }
          }
          pdf.save("Slock_Catalog.pdf");
          btn.innerHTML = "✅ Saved!";
        }
        
        setTimeout(() => { btn.innerHTML = originalText; btn.disabled = false; }, 2000);
      } catch (err) {
        alert("Download failed: " + err.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });
    
    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (!flipbookReady) return;
      if (e.key === "ArrowLeft") $flipbook.turn("previous");
      if (e.key === "ArrowRight") $flipbook.turn("next");
    });
    
    // Start loading the catalog
    loadLocalPDF();
  })();
</script>
</body>
</html>
